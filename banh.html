<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightQuiz</title>
    <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            --bg:#0f0f1e;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);
            --text:#e2e8f0;--text2:#94a3b8;--green:#00b894;--red:#ff6b6b;--yellow:#fdcb6e;--radius:18px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{
            font-family:'Inter',system-ui,sans-serif;
            background:linear-gradient(135deg,#0f0f1e,#1a1a2e);
            color:var(--text);min-height:100vh;overflow-x:hidden;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:radial-gradient(ellipse at 30% 50%,rgba(108,92,231,0.1) 0%,transparent 50%),
                       radial-gradient(ellipse at 70% 30%,rgba(253,203,110,0.06) 0%,transparent 50%);
            pointer-events:none;z-index:0;
        }
        .upload-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;padding:20px}
        .upload-box{
            background:rgba(255,255,255,0.03);backdrop-filter:blur(30px);
            border:1px solid rgba(255,255,255,0.1);border-radius:24px;
            padding:40px;text-align:center;max-width:480px;width:100%;
            box-shadow:0 20px 60px rgba(0,0,0,0.4);
        }
        .upload-box.drag-over{border-color:var(--yellow);background:rgba(253,203,110,0.08)}
        .upload-icon{font-size:4rem;margin-bottom:16px;display:inline-block;animation:bulbGlow 2s ease-in-out infinite}
        @keyframes bulbGlow{0%,100%{text-shadow:0 0 20px rgba(253,203,110,0.3);transform:scale(1)}50%{text-shadow:0 0 40px rgba(253,203,110,0.8);transform:scale(1.08)}}
        .logo-text{
            display:inline-block;background:linear-gradient(135deg,#fdcb6e,#f39c12,#fdcb6e);background-size:200% 200%;
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
            animation:shimmer 2s ease-in-out infinite;
        }
        @keyframes shimmer{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
        .upload-title{font-size:1.8rem;font-weight:800;margin-bottom:4px}
        .upload-subtitle{color:var(--text2);font-size:.9rem;margin:12px 0 24px}
        .btn{border:none;padding:12px 28px;border-radius:50px;font-weight:700;cursor:pointer;font-size:.9rem}
        .btn:active{transform:scale(.96)}
        .btn-primary{background:linear-gradient(135deg,#fdcb6e,#f39c12);color:#1a1a2e}
        .btn-outline{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text)}
        .btn-sm{padding:6px 10px;font-size:.7rem;border-radius:50px}
        .btn-danger{background:rgba(255,107,107,0.15);border:1px solid rgba(255,107,107,0.3);color:var(--red);padding:6px 10px;font-size:.7rem;border-radius:50px;cursor:pointer}
        .file-name{margin-top:16px;color:var(--yellow);font-weight:600;font-size:.85rem}
        #fileInput,#fileInput3,#imageInput{display:none}
        .loading-overlay{position:fixed;inset:0;background:rgba(15,15,30,0.9);z-index:200;display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px}
        .loading-overlay.show{display:flex}
        .spinner{width:50px;height:50px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--yellow);border-radius:50%;animation:spin .7s linear infinite}
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{font-weight:600;color:var(--text)}
        .main-app{display:none;max-width:1200px;margin:0 auto;padding:20px;position:relative;z-index:1}
        .top-bar{
            background:rgba(255,255,255,0.05);backdrop-filter:blur(30px);
            border:1px solid rgba(255,255,255,0.1);border-radius:50px;
            padding:8px 10px 8px 20px;display:flex;align-items:center;
            justify-content:space-between;gap:8px;margin-bottom:16px;
            position:sticky;top:16px;z-index:50;flex-wrap:wrap;
        }
        .top-left{display:flex;align-items:center;gap:6px}
        .logo-icon{font-size:1.2rem;animation:bulbGlow 2s ease-in-out infinite}
        .logo-name{font-size:1rem;font-weight:800;background:linear-gradient(135deg,#fdcb6e,#f39c12,#fdcb6e);background-size:200% 200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 2s ease-in-out infinite}
        .stats{background:rgba(253,203,110,0.15);color:var(--yellow);padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
        .action-group{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
        .user-pill{
            position:relative;display:flex;align-items:center;gap:3px;
            background:rgba(253,203,110,0.1);border-radius:50px;
            padding:3px 8px 3px 3px;cursor:pointer;transition:all .2s;
        }
        .user-pill:hover{background:rgba(253,203,110,0.2)}
        .avatar-circle{
            width:32px;height:32px;border-radius:50%;
            background:linear-gradient(135deg,#fdcb6e,#f39c12);
            display:flex;align-items:center;justify-content:center;
            font-weight:800;font-size:.75rem;color:#1a1a2e;flex-shrink:0;
        }
        .dropdown-menu{
            position:absolute;top:110%;right:0;
            background:rgba(20,20,40,0.98);border:1px solid rgba(255,255,255,0.15);
            border-radius:14px;padding:6px;min-width:180px;z-index:400;
            display:none;box-shadow:0 10px 30px rgba(0,0,0,0.5);
        }
        .dropdown-menu.show{display:block}
        .dropdown-item{
            display:flex;align-items:center;gap:8px;padding:9px 12px;
            border-radius:10px;cursor:pointer;color:var(--text);
            font-size:.78rem;font-weight:500;
        }
        .dropdown-item:hover{background:rgba(255,255,255,0.08)}
        .left-panel{
            background:rgba(255,255,255,0.02);backdrop-filter:blur(20px);
            border:1px solid var(--border);border-radius:var(--radius);
            padding:16px;max-height:75vh;overflow-y:auto;scroll-behavior:smooth;
        }
        .left-panel::-webkit-scrollbar{width:4px}
        .left-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:10px}
        .q-card{
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
            border-radius:14px;padding:16px;margin-bottom:10px;
        }
        .q-card.correct-card{border-left:3px solid var(--green);background:rgba(0,184,148,0.05)}
        .q-card.wrong-card{border-left:3px solid var(--red);background:rgba(255,107,107,0.05)}
        .q-card.hidden{display:none}
        .q-text{font-weight:700;margin-bottom:10px;line-height:1.5;font-size:.9rem;white-space:pre-wrap}
        .q-image{max-width:100%;max-height:250px;border-radius:10px;margin-bottom:8px;display:block}
        .options{display:flex;flex-direction:column;gap:4px}
        .opt{
            display:flex;align-items:center;gap:8px;padding:9px 14px;border-radius:50px;
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.05);
            cursor:pointer;font-size:.85rem;
        }
        .opt:hover{background:rgba(255,255,255,0.06)}
        .opt-letter{
            font-weight:800;width:28px;height:28px;
            background:rgba(253,203,110,0.2);color:var(--yellow);border-radius:50%;
            display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.7rem;
        }
        .opt.correct-answer{background:rgba(0,184,148,0.15);border-color:rgba(0,184,148,0.3)}
        .opt.correct-answer .opt-letter{background:var(--green);color:#fff}
        .opt.selected-answer{background:rgba(253,203,110,0.25);border-color:rgba(253,203,110,0.5)}
        .opt.selected-answer .opt-letter{background:#fff;color:#1a1a2e}
        .answer-badge{display:inline-block;margin-top:6px;padding:3px 10px;border-radius:20px;font-size:.7rem;font-weight:600}
        .answer-badge.set{background:rgba(0,184,148,0.15);color:#55efc4}
        .answer-badge.unset{background:rgba(255,255,255,0.05);color:var(--text2)}
        .sidebar{
            position:fixed;top:0;right:0;width:360px;height:100%;
            background:rgba(15,15,30,0.95);backdrop-filter:blur(30px);
            border-left:1px solid var(--border);z-index:99;
            transform:translateX(100%);transition:transform .25s;
            padding:20px;overflow-y:auto;
        }
        .sidebar.open{transform:translateX(0)}
        .menu-btn{
            position:fixed;left:16px;top:50%;transform:translateY(-50%);
            width:40px;height:40px;border-radius:12px;
            background:rgba(253,203,110,0.2);border:1px solid rgba(253,203,110,0.3);
            color:var(--yellow);font-size:1.1rem;cursor:pointer;z-index:98;
            display:flex;align-items:center;justify-content:center;
        }
        .nav-circle{
            width:30px;height:30px;border-radius:50%;
            background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
            display:inline-flex;align-items:center;justify-content:center;
            margin:2px;cursor:pointer;font-size:.65rem;font-weight:600;color:var(--text2);
        }
        .nav-circle.answered{background:var(--green);color:#fff}
        .nav-circle.result-correct{background:var(--green);color:#fff}
        .nav-circle.result-wrong{background:var(--red);color:#fff}
        .filter-btn{
            padding:3px 8px;border-radius:15px;border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.03);color:var(--text2);cursor:pointer;font-size:.65rem;
        }
        .filter-btn.active{background:rgba(253,203,110,0.3);border-color:rgba(253,203,110,0.5);color:var(--yellow)}
        .submit-btn{
            background:linear-gradient(135deg,#fdcb6e,#f39c12);color:#1a1a2e;
            padding:12px;border-radius:50px;font-size:.9rem;font-weight:700;
            cursor:pointer;width:100%;margin-top:10px;border:none;
        }
        .back-to-top{
            position:fixed;bottom:20px;right:20px;width:40px;height:40px;
            border-radius:50%;background:rgba(253,203,110,0.3);
            border:1px solid rgba(255,255,255,0.2);color:#fff;
            font-size:1rem;cursor:pointer;z-index:90;display:none;
            align-items:center;justify-content:center;
        }
        .back-to-top.show{display:flex}
        .toast{
            position:fixed;top:16px;right:16px;
            background:rgba(25,25,45,0.95);border:1px solid rgba(255,255,255,0.1);
            padding:10px 18px;border-radius:50px;z-index:300;
            font-size:.8rem;font-weight:600;
            animation:fadeOut 2.5s ease forwards;pointer-events:none;
        }
        @keyframes fadeOut{0%,70%{opacity:1}100%{opacity:0;transform:translateY(-10px)}}
        .modal-overlay{
            position:fixed;inset:0;background:rgba(0,0,0,0.7);
            z-index:250;display:flex;align-items:center;justify-content:center;
        }
        .modal-dialog{
            background:rgba(25,25,45,0.98);border:1px solid rgba(255,255,255,0.15);
            border-radius:18px;padding:24px;max-width:400px;width:90%;text-align:center;
        }
        .modal-dialog h3{font-size:1.1rem;margin-bottom:14px;color:var(--text)}
        .modal-dialog input{
            width:100%;padding:10px 14px;margin:8px 0;
            background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);
            border-radius:10px;color:var(--text);font-size:.9rem;text-align:center;
        }
        .modal-dialog input:focus{outline:none;border-color:var(--yellow)}
        .modal-buttons{display:flex;gap:8px;justify-content:center;margin-top:12px}
        .btn-cancel{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text2);padding:8px 20px;border-radius:50px;cursor:pointer;font-size:.8rem}
        .btn-gold-modal{background:linear-gradient(135deg,#fdcb6e,#f39c12);color:#1a1a2e;padding:8px 20px;border-radius:50px;cursor:pointer;font-weight:700;font-size:.8rem;border:none}
        .auth-screen{position:fixed;inset:0;z-index:150;display:flex;align-items:center;justify-content:center;background:rgba(15,15,30,0.95)}
        .auth-box{background:rgba(255,255,255,0.04);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:30px;max-width:400px;width:90%;text-align:center}
        .auth-tabs{display:flex;background:rgba(255,255,255,0.03);border-radius:10px;padding:3px;margin-bottom:16px}
        .auth-tab{flex:1;padding:8px;border-radius:8px;cursor:pointer;font-weight:700;font-size:.85rem;border:none;background:none;color:#94a3b8}
        .auth-tab.active{background:rgba(253,203,110,0.2);color:#fdcb6e}
        .auth-input{width:100%;padding:10px;margin:6px 0;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#e2e8f0;font-size:.9rem}
        .auth-error{background:rgba(255,107,107,0.15);color:#ff6b6b;padding:6px;border-radius:8px;font-size:.75rem;margin:6px 0;display:none}
        .auth-error.show{display:block}
        @media(max-width:768px){.sidebar{width:100%}.upload-box{padding:24px 16px}.menu-btn{left:8px;width:36px;height:36px}}
    </style>
</head>
<body>

<div class="loading-overlay" id="loading"><div class="spinner"></div><div class="loading-text" id="loadingText">Đang xử lý...</div></div>

<div class="auth-screen" id="authScreen">
    <div class="auth-box">
        <div style="font-size:1.8rem;margin-bottom:6px">💡</div>
        <div class="logo-text" style="font-size:1.3rem;margin-bottom:12px">LightQuiz</div>
        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">🔑 Đăng Nhập</button>
            <button class="auth-tab" onclick="switchTab('register')">📝 Đăng Ký</button>
        </div>
        <div id="loginForm">
            <input class="auth-input" type="email" id="loginEmail" placeholder="Email">
            <input class="auth-input" type="password" id="loginPass" placeholder="Mật khẩu">
            <div class="auth-error" id="loginError"></div>
            <button class="btn-gold" onclick="login()" style="width:100%;padding:10px">🔑 Đăng Nhập</button>
        </div>
        <div id="registerForm" style="display:none">
            <input class="auth-input" type="text" id="regName" placeholder="Tên hiển thị">
            <input class="auth-input" type="email" id="regEmail" placeholder="Email">
            <input class="auth-input" type="password" id="regPass" placeholder="Mật khẩu (6+ ký tự)">
            <input class="auth-input" type="password" id="regConfirm" placeholder="Nhập lại mật khẩu">
            <div class="auth-error" id="regError"></div>
            <button class="btn-gold" onclick="register()" style="width:100%;padding:10px">📝 Đăng Ký</button>
        </div>
    </div>
</div>

<div class="upload-screen" id="uploadScreen">
    <div class="upload-box" id="uploadBox">
        <div class="upload-icon">💡</div>
        <div class="upload-title"><span class="logo-text">LightQuiz</span></div>
        <div class="upload-subtitle">Soi sáng kiến thức - Bứt phá điểm số</div>
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📥 Chọn file Word</button>
        <div class="file-name" id="fileName"></div>
    </div>
    <input type="file" id="fileInput" accept=".docx">
</div>

<div class="main-app" id="mainApp">
    <div class="top-bar" id="topBar">
        <div class="top-left">
            <span class="logo-icon">💡</span>
            <span class="logo-name">LightQuiz</span>
            <span class="stats" id="stats">0/0</span>
        </div>
        <div class="action-group" id="actions">
            <button class="btn btn-primary btn-sm" onclick="shuffleQuestions()">🔀 Xáo</button>
            <button class="btn btn-primary btn-sm" onclick="showCreateExamModal()">📌 Tạo đề</button>
            <button class="btn btn-outline btn-sm" onclick="showResetModal()">🔄 Reset</button>
            <button class="btn-danger" onclick="clearAllQuestions()">🗑 Xóa hết</button>
            <div class="user-pill" id="userPill" onclick="toggleDropdown(event)">
                <div class="avatar-circle" id="userInitial">U</div>
                <span style="font-size:.55rem;color:var(--yellow)">▼</span>
                <div class="dropdown-menu" id="dropdownMenu">
                    <div class="dropdown-item" onclick="event.stopPropagation();addQuestion()">➕ Thêm câu</div>
                    <div class="dropdown-item" onclick="event.stopPropagation();document.getElementById('fileInput3').click()">📂 Thêm file</div>
                    <div class="dropdown-item" onclick="event.stopPropagation();showImageModal()">🖼 Thêm ảnh</div>
                    <div class="dropdown-item" onclick="event.stopPropagation();logout()" style="color:#ff6b6b">🚪 Đăng xuất</div>
                </div>
            </div>
            <input type="file" id="fileInput3" accept=".docx">
            <input type="file" id="imageInput" accept="image/*">
        </div>
    </div>
    <div class="left-panel" id="panel"></div>
</div>

<div class="sidebar" id="sidebar"><div id="sidebarContent"></div></div>
<button class="menu-btn" id="menuBtn">☰</button>
<button class="back-to-top" id="backToTop">↑</button>

<script>
const $=id=>document.getElementById(id);
const firebaseConfig={
    apiKey:"AIzaSyDof7yrO0Z9YazsfHtevfid2nFwYB9_03Y",
    authDomain:"lightquiz-app.firebaseapp.com",
    databaseURL:"https://lightquiz-app-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId:"lightquiz-app",
    storageBucket:"lightquiz-app.firebasestorage.app",
    messagingSenderId:"610026189000",
    appId:"1:610026189000:web:d4f417e7ab380d8f3b35fd"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database(),auth=firebase.auth();
let currentUser=null,userExamsRef=null,questions=[],exams=[];
let currentMode='teacher',currentExam=null,userAnswers={},submitted=false,results=[];

// AUTH
auth.onAuthStateChanged(user=>{
    if(user){
        currentUser=user;userExamsRef=db.ref('users/'+user.uid+'/exams');
        $('authScreen').style.display='none';$('mainApp').style.display='block';
        $('userInitial').textContent=(user.email||'U')[0].toUpperCase();
        loadUserExams();
    }else{
        currentUser=null;userExamsRef=null;exams=[];
        $('authScreen').style.display='flex';$('mainApp').style.display='none';
    }
});
function loadUserExams(){
    if(!userExamsRef)return;
    userExamsRef.on('value',snap=>{exams=Object.values(snap.val()||{}).sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));renderTeacher()});
}
function switchTab(tab){
    document.querySelectorAll('.auth-tab').forEach(t=>t.classList.remove('active'));
    $('loginError').classList.remove('show');$('regError').classList.remove('show');
    if(tab==='login'){$('loginForm').style.display='block';$('registerForm').style.display='none';document.querySelector('.auth-tab:nth-child(1)').classList.add('active')}
    else{$('loginForm').style.display='none';$('registerForm').style.display='block';document.querySelector('.auth-tab:nth-child(2)').classList.add('active')}
}
function login(){
    const e=$('loginEmail').value.trim(),p=$('loginPass').value,er=$('loginError');
    if(!e||!p){er.textContent='❌ Nhập đầy đủ';er.classList.add('show');return}
    auth.signInWithEmailAndPassword(e,p).catch(()=>{er.textContent='❌ Sai email/mật khẩu';er.classList.add('show')});
}
function register(){
    const n=$('regName').value.trim(),e=$('regEmail').value.trim(),p=$('regPass').value,c=$('regConfirm').value,er=$('regError');
    if(!e||!p){er.textContent='❌ Nhập đầy đủ';er.classList.add('show');return}
    if(p.length<6){er.textContent='❌ Mật khẩu 6+ ký tự';er.classList.add('show');return}
    if(p!==c){er.textContent='❌ Không khớp';er.classList.add('show');return}
    auth.createUserWithEmailAndPassword(e,p).then(()=>{if(n)db.ref('users/'+auth.currentUser.uid+'/profile').set({name:n,email:e});switchTab('login');$('loginEmail').value=e}).catch(x=>{er.textContent='❌ '+(x.code==='auth/email-already-in-use'?'Email đã đăng ký':'Lỗi');er.classList.add('show')});
}
function logout(){if(confirm('🚪 Đăng xuất?'))auth.signOut()}
function save(){if(userExamsRef)userExamsRef.set(exams)}

// DROPDOWN
function toggleDropdown(e){e.stopPropagation();$('dropdownMenu').classList.toggle('show')}
document.addEventListener('click',()=>$('dropdownMenu').classList.remove('show'));

// TOAST
function notify(m){const t=document.createElement('div');t.className='toast';t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),2600)}
function showLoading(m){$('loadingText').textContent=m;$('loading').classList.add('show')}
function hideLoading(){$('loading').classList.remove('show')}

// MODAL NHẬP SỐ CÂU ĐỂ THÊM ẢNH
function showImageModal(){
    if(!questions.length){notify('❌ Chưa có câu hỏi');return}
    const overlay=document.createElement('div');overlay.className='modal-overlay';
    overlay.innerHTML=`<div class="modal-dialog"><h3>🖼 Thêm ảnh vào câu số mấy?</h3><input type="number" id="imgQNum" placeholder="Nhập số câu (1-${questions.length})" min="1" max="${questions.length}"><div class="modal-buttons"><button class="btn-cancel" id="cancelImg">Hủy</button><button class="btn-gold-modal" id="confirmImg">📸 Chọn ảnh</button></div></div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove()});

// PARSE
function parseQuestions(text){
    text=text.replace(/\r\n/g,'\n').replace(/\r/g,'\n');
    const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
    const blocks=[];let current=null;
    for(const line of lines){
        let m=line.match(/^(?:Câu|câu)\s*(\d+)[:.]?\s*(.*)/i);
        if(!m){m=line.match(/^(\d+)[:.]\s+(.+)/);if(m&&parseInt(m[1])>=1&&parseInt(m[1])<=200)m=[m[0],m[1],m[2]];else m=null}
        if(m){if(current)blocks.push(current);current={num:parseInt(m[1]),content:[m[2]||'']}}
        else if(current)current.content.push(line);
    }
    if(current)blocks.push(current);
    const result=[];
    for(const block of blocks){
        const full=block.content.join(' ');let options=[];
        const optRegex=/([A-D])\.\s+(.*?)(?=\s+[A-D]\.\s|$)/g;let m;
        while((m=optRegex.exec(full))!==null){const label=m[1];if(!options.find(o=>o.label===label))options.push({label,content:m[2].trim()})}
        if(options.length<2){options=[];for(const line of block.content){const om=line.match(/^([A-D])\.\s+(.+)/);if(om)options.push({label:om[1],content:om[2].trim()})}}
        if(options.length<2){const parts=full.split(/\s+[A-D]\.\s+/);if(parts.length>=5)options=[{label:'A',content:parts[1].trim()},{label:'B',content:parts[2].trim()},{label:'C',content:parts[3].trim()},{label:'D',content:parts[4].trim()}]}
        if(options.length>=2){
            let qText=full;const idx=full.search(/[A-D]\./);if(idx>0)qText=full.substring(0,idx).trim();
            const seen=new Set();let filtered=[];
            for(const o of options){if(!seen.has(o.label)){seen.add(o.label);filtered.push(o)}}
            while(filtered.length<4){const labels=['A','B','C','D'];const missing=labels.find(l=>!seen.has(l));if(missing){filtered.push({label:missing,content:''});seen.add(missing)}else break}
            filtered.sort((a,b)=>a.label.localeCompare(b.label));
            result.push({id:block.num,text:qText||`Câu ${block.num}`,options:filtered.slice(0,4),correct:null,image:null});
        }
    }
    result.sort((a,b)=>a.id-b.id);result.forEach((q,i)=>q.id=i+1);
    return result;
}

// LOAD FILE
async function loadFile(file,append=false){
    showLoading('Đang đọc file...');
    try{
        const buf=await file.arrayBuffer();
        const result=await mammoth.extractRawText({arrayBuffer:buf});
        const text=result.value;
        if(!text||text.length<10)throw new Error('File rỗng');
        const parsed=parseQuestions(text);
        if(!parsed.length)throw new Error('Không tìm thấy câu hỏi');
        if(append&&questions.length>0){
            const startId=questions.length+1;
            parsed.forEach((q,i)=>{q.id=startId+i});
            questions=[...questions,...parsed];
        }else{questions=parsed}
        hideLoading();
        if(!append)$('uploadScreen').style.display='none';
        renderTeacher();
        notify(`✅ ${append?'Nối tiếp':'Đã tải'} ${parsed.length} câu`);
    }catch(e){hideLoading();notify('❌ '+e.message)}
}

// IMAGE
function loadImageToQuestion(file,targetIdx){
    if(!file)return;
    const reader=new FileReader();
    reader.onload=function(e){
        questions[targetIdx].image=e.target.result;
        renderTeacher();
        notify(`🖼 Đã thêm ảnh vào câu ${targetIdx+1}`);
    };
    reader.readAsDataURL(file);
}

// SHUFFLE
function shuffleQuestions(){
    if(questions.length<2)return notify('Cần ít nhất 2 câu');
    for(let i=questions.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[questions[i],questions[j]]=[questions[j],questions[i]]}
    questions.forEach((q,i)=>q.id=i+1);
    renderTeacher();notify('🔀 Đã xáo trộn');
}
function clearAllQuestions(){
    if(!questions.length)return;
    if(!confirm('🗑 Xóa toàn bộ?'))return;
    questions=[];renderTeacher();notify('🗑 Đã xóa hết');
}

// DO EXAM
function doExam(id){
    const ex=exams.find(e=>e.id===id);if(!ex)return;

    $('actions').style.display='none';

    renderExamUI();

    if(!currentExam)return;

        const imgHtml=q.image?`<img src="${q.image}" class="q-image" style="max-width:100%;max-height:180px;border-radius:8px;margin-bottom:6px">`:'';
        const opts=q.options.map(o=>`<div class="opt ${userAnswers[i]===o.label?'selected-answer':''}" id="opt_${i}_${o.label}" onclick="selectOption(${i},'${o.label}')"><span class="opt-letter">${o.label}</span><span>${o.content||'(Trống)'}</span></div>`).join('');
        return `<div class="q-card" id="q_${i}">${imgHtml}<div class="q-text">Câu ${i+1}: ${q.text}</div><div class="options">${opts}</div></div>`;
    }).join('');

function selectOption(i,l){
    if(submitted||currentMode!=='doing')return;
    userAnswers[i]=l;
    const c=$('q_'+i);if(c){c.querySelectorAll('.opt').forEach(o=>{o.classList.remove('selected-answer');if(o.id==='opt_'+i+'_'+l)o.classList.add('selected-answer')})}
    const n=$('nav_'+i);if(n)n.classList.add('answered');

function submitExam(){
    if(submitted||!currentExam)return;submitted=true;
    let correct=0;results=[];
    currentExam.questions.forEach((q,i)=>{
        const ok=(q.correct&&userAnswers[i]===q.correct);
        if(ok)correct++;results.push({isCorrect:ok,correct:q.correct});
        const c=$('q_'+i);if(c){c.classList.add(ok?'correct-card':'wrong-card');if(q.correct){const co=$('opt_'+i+'_'+q.correct);if(co)co.classList.add('correct-answer')}}
    });
    const total=currentExam.questions.length,score=(correct/total*10).toFixed(1);
    currentExam.questions.forEach((_,i)=>{const n=$('nav_'+i);if(n)n.className='nav-circle '+(results[i].isCorrect?'result-correct':'result-wrong')});
    $('filterBtns').innerHTML=`<button class="filter-btn active" onclick="filterCards('all')">Tất cả</button><button class="filter-btn" onclick="filterCards('correct')">✅ ${correct}</button><button class="filter-btn" onclick="filterCards('wrong')">❌ ${total-correct}</button>`;
    $('resultArea').innerHTML=`<div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:16px;text-align:center;margin-bottom:16px"><div style="font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#fdcb6e,#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🏆 ${score}/10</div><div>✅ ${correct}/${total}</div><button class="btn btn-outline btn-sm" onclick="retryExam()" style="margin-top:6px">🔄 Làm lại</button></div>`;
    $('submitArea').innerHTML=`<div style="background:rgba(255,255,255,0.05);border-radius:10px;padding:8px;text-align:center;margin-top:8px;font-size:.8rem"><span style="color:var(--yellow);font-weight:700">🏆 ${score}/10</span></div>`;
    $('submitSidebarBtn').style.display='none';$('backBtn').style.display='inline-block';
    $('panel').scrollTo({top:0,behavior:'smooth'});
}
function filterCards(type){
    document.querySelectorAll('#filterBtns .filter-btn').forEach(b=>b.classList.remove('active'));
    event.target.classList.add('active');
    document.querySelectorAll('#panel .q-card').forEach((c,i)=>{if(type==='all')c.classList.remove('hidden');else if(type==='correct')results[i]?.isCorrect?c.classList.remove('hidden'):c.classList.add('hidden');else results[i]&&!results[i].isCorrect?c.classList.remove('hidden'):c.classList.add('hidden')});
}
function retryExam(){
    userAnswers={};submitted=false;results=[];
    renderExamUI();
    $('filterBtns').innerHTML='';$('submitArea').innerHTML='';$('submitSidebarBtn').style.display='block';$('backBtn').style.display='none';
}
function backToTeacher(){currentMode='teacher';currentExam=null;userAnswers={};submitted=false;results=[];$('actions').style.display='flex';renderTeacher();$('sidebar').classList.remove('open')}

// FILE EVENTS
$('fileInput').addEventListener('change',async e=>{if(e.target.files[0]){$('fileName').textContent=e.target.files[0].name;await loadFile(e.target.files[0])}});
$('fileInput3').addEventListener('change',async e=>{if(e.target.files[0])await loadFile(e.target.files[0],true)});
$('imageInput').addEventListener('change',function(){
    if(this.files[0]&&window._imgTargetQ!==undefined){
        loadImageToQuestion(this.files[0],window._imgTargetQ);
        delete window._imgTargetQ;
        this.value='';
    }
});

// DRAG & DROP
const uploadBox=$('uploadBox');
uploadBox.addEventListener('dragover',e=>{e.preventDefault();uploadBox.classList.add('drag-over')});
uploadBox.addEventListener('dragleave',()=>uploadBox.classList.remove('drag-over'));
uploadBox.addEventListener('drop',async e=>{e.preventDefault();uploadBox.classList.remove('drag-over');const f=e.dataTransfer.files[0];if(f&&f.name.endsWith('.docx')){$('fileName').textContent=f.name;await loadFile(f)}});
document.addEventListener('dragover',e=>e.preventDefault());
document.addEventListener('drop',e=>e.preventDefault());

// KEYBOARD
document.addEventListener('keydown',e=>{
    if(e.key==='Tab'){e.preventDefault();$('sidebar').classList.toggle('open')}
    if(e.key==='Escape'){$('sidebar').classList.remove('open');document.querySelectorAll('.modal-overlay').forEach(m=>m.remove());$('dropdownMenu').classList.remove('show')}
});
document.addEventListener('click',e=>{
    const s=$('sidebar');
    if(s.classList.contains('open')&&!s.contains(e.target)&&e.target!==$('menuBtn'))s.classList.remove('open');
});
$('menuBtn').addEventListener('click',()=>$('sidebar').classList.toggle('open'));
</script>
</body>
</html>
