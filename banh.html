<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trắc nghiệm Pro</title>
    <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
    <style>
        :root {
            --bg: #0f0f1e;
            --surface: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --text: #e2e8f0;
            --text2: #94a3b8;
            --purple: #6c5ce7;
            --purple2: #a29bfe;
            --green: #00b894;
            --red: #ff6b6b;
            --radius: 18px;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{
            font-family:'Inter',system-ui,sans-serif;
            background:linear-gradient(135deg,#0f0f1e,#1a1a2e);
            color:var(--text);min-height:100vh;overflow-x:hidden;
        }
        body::before{
            content:'';position:fixed;inset:0;
            background:radial-gradient(ellipse at 30% 50%,rgba(108,92,231,0.1) 0%,transparent 50%),
                       radial-gradient(ellipse at 70% 30%,rgba(85,239,196,0.06) 0%,transparent 50%);
            pointer-events:none;z-index:0;
        }

        .upload-screen{
            position:fixed;inset:0;z-index:100;
            display:flex;align-items:center;justify-content:center;padding:20px;
        }
        .upload-box{
            background:rgba(255,255,255,0.03);backdrop-filter:blur(30px);
            border:1px solid rgba(255,255,255,0.1);border-radius:24px;
            padding:40px;text-align:center;max-width:480px;width:100%;
            box-shadow:0 20px 60px rgba(0,0,0,0.4);transition:transform .25s,box-shadow .25s;
        }
        .upload-box:hover{transform:translateY(-4px);box-shadow:0 30px 80px rgba(108,92,231,0.2)}
        .upload-box.drag-over{border-color:var(--purple);background:rgba(108,92,231,0.08)}
        .upload-icon{font-size:4rem;margin-bottom:16px}
        .upload-title{
            font-size:1.5rem;font-weight:800;
            background:linear-gradient(135deg,var(--purple2),#55efc4);
            -webkit-background-clip:text;-webkit-text-fill-color:transparent;
        }
        .upload-subtitle{color:var(--text2);font-size:.9rem;margin:12px 0 24px}
        .btn{
            border:none;padding:12px 28px;border-radius:50px;
            font-weight:700;cursor:pointer;transition:all .15s;font-size:.9rem;
        }
        .btn:active{transform:scale(.96)}
        .btn-primary{
            background:linear-gradient(135deg,var(--purple),#5f27cd);
            color:#fff;box-shadow:0 4px 20px rgba(108,92,231,0.3);
        }
        .btn-primary:hover{box-shadow:0 8px 30px rgba(108,92,231,0.5);transform:translateY(-2px)}
        .btn-outline{
            background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(--text);
        }
        .btn-outline:hover{background:rgba(255,255,255,0.1)}
        .btn-sm{padding:6px 14px;font-size:.75rem}
        .file-name{margin-top:16px;color:#55efc4;font-weight:600;font-size:.85rem}
        #fileInput,#fileInput2{display:none}

        .loading-overlay{
            position:fixed;inset:0;background:rgba(15,15,30,0.9);
            backdrop-filter:blur(10px);z-index:200;
            display:none;align-items:center;justify-content:center;flex-direction:column;gap:20px;
        }
        .loading-overlay.show{display:flex}
        .spinner{
            width:50px;height:50px;border:3px solid rgba(255,255,255,0.1);
            border-top-color:var(--purple2);border-radius:50%;animation:spin .7s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg)}}
        .loading-text{font-weight:600;color:var(--text)}

        .app{display:none;max-width:1200px;margin:0 auto;padding:20px;position:relative;z-index:1}
        .top-bar{
            background:var(--surface);backdrop-filter:blur(30px);
            border:1px solid var(--border);border-radius:var(--radius);
            padding:12px 20px;display:flex;flex-wrap:wrap;align-items:center;
            justify-content:space-between;gap:10px;margin-bottom:16px;
            position:sticky;top:16px;z-index:50;
        }
        .logo{font-weight:800;color:var(--purple2);display:flex;align-items:center;gap:8px}
        .stats{
            background:rgba(108,92,231,0.15);color:var(--purple2);
            padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600;
        }
        .action-group{display:flex;gap:8px;flex-wrap:wrap}

        .left-panel{
            background:rgba(255,255,255,0.02);backdrop-filter:blur(20px);
            border:1px solid var(--border);border-radius:var(--radius);
            padding:20px;max-height:75vh;overflow-y:auto;scroll-behavior:smooth;
        }
        .left-panel::-webkit-scrollbar{width:4px}
        .left-panel::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.15);border-radius:10px}

        .q-card{
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
            border-radius:16px;padding:20px;margin-bottom:12px;transition:all .15s;
        }
        .q-card:hover{border-color:rgba(255,255,255,0.12)}
        .q-card.hidden{display:none}
        .q-card.correct-card{border-left:3px solid var(--green);background:rgba(0,184,148,0.05)}
        .q-card.wrong-card{border-left:3px solid var(--red);background:rgba(255,107,107,0.05)}
        .q-text{font-weight:700;margin-bottom:12px;line-height:1.6;white-space:pre-wrap}
        .options{display:flex;flex-direction:column;gap:6px}
        .opt{
            display:flex;align-items:center;gap:10px;
            padding:10px 16px;border-radius:50px;
            background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);
            cursor:pointer;transition:all .12s;
        }
        .opt:hover{background:rgba(255,255,255,0.06)}
        .opt-letter{
            font-weight:800;width:32px;height:32px;
            background:rgba(108,92,231,0.2);color:var(--purple2);
            border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;
        }
        .opt.correct-answer{background:rgba(0,184,148,0.15);border-color:rgba(0,184,148,0.3)}
        .opt.correct-answer .opt-letter{background:var(--green);color:#fff}
        .opt.selected-answer{background:rgba(108,92,231,0.3);border-color:rgba(108,92,231,0.5)}
        .opt.selected-answer .opt-letter{background:#fff;color:var(--purple)}
        .answer-badge{
            display:inline-block;margin-top:8px;padding:4px 12px;
            border-radius:20px;font-size:.75rem;font-weight:600;
        }
        .answer-badge.set{background:rgba(0,184,148,0.15);color:#55efc4}
        .answer-badge.unset{background:rgba(255,255,255,0.05);color:var(--text2)}

        .sidebar{
            position:fixed;top:0;right:0;width:380px;height:100%;
            background:rgba(15,15,30,0.95);backdrop-filter:blur(30px);
            border-left:1px solid var(--border);z-index:99;
            transform:translateX(100%);transition:transform .25s;
            padding:20px;overflow-y:auto;scroll-behavior:smooth;
        }
        .sidebar.open{transform:translateX(0)}

        .menu-btn{
            position:fixed;left:20px;top:50%;transform:translateY(-50%);
            width:44px;height:44px;border-radius:14px;
            background:rgba(108,92,231,0.2);border:1px solid rgba(108,92,231,0.3);
            color:var(--purple2);font-size:1.2rem;cursor:pointer;z-index:98;
            display:flex;align-items:center;justify-content:center;transition:all .2s;
        }
        .menu-btn:hover{background:rgba(108,92,231,0.3)}
        .nav-circle{
            width:32px;height:32px;border-radius:50%;
            background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);
            display:inline-flex;align-items:center;justify-content:center;
            margin:3px;cursor:pointer;font-size:.7rem;font-weight:600;
            transition:all .15s;color:var(--text2);
        }
        .nav-circle:hover{background:rgba(255,255,255,0.1)}
        .nav-circle.answered{background:var(--green);color:#fff;border-color:var(--green)}
        .nav-circle.result-correct{background:var(--green);color:#fff}
        .nav-circle.result-wrong{background:var(--red);color:#fff}
        .filter-btn{
            padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);
            background:rgba(255,255,255,0.03);color:var(--text2);
            cursor:pointer;font-size:.7rem;font-weight:500;transition:all .15s;
        }
        .filter-btn.active{background:rgba(108,92,231,0.3);border-color:rgba(108,92,231,0.5);color:var(--purple2)}
        .submit-btn{
            background:linear-gradient(135deg,var(--purple),#5f27cd);
            color:#fff;border:none;padding:14px;border-radius:50px;
            font-size:1rem;font-weight:700;cursor:pointer;width:100%;
            margin-top:12px;transition:all .15s;
        }
        .submit-btn:hover{box-shadow:0 8px 30px rgba(108,92,231,0.4)}

        /* NÚT BACK TO TOP */
        .back-to-top{
            position:fixed;bottom:24px;right:24px;
            width:44px;height:44px;border-radius:50%;
            background:rgba(108,92,231,0.3);border:1px solid rgba(255,255,255,0.2);
            color:#fff;font-size:1.2rem;cursor:pointer;z-index:90;
            display:none;align-items:center;justify-content:center;
            transition:all .2s;backdrop-filter:blur(10px);
        }
        .back-to-top:hover{background:rgba(108,92,231,0.5);transform:translateY(-2px)}
        .back-to-top.show{display:flex}

        .toast{
            position:fixed;top:20px;right:20px;
            background:rgba(30,30,50,0.95);backdrop-filter:blur(20px);
            border:1px solid var(--border);padding:12px 24px;border-radius:50px;
            z-index:300;font-weight:600;font-size:.85rem;
            animation:slideIn .3s ease,fadeOut .3s 2s ease forwards;
            pointer-events:none;
        }
        @keyframes slideIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
        @keyframes fadeOut{to{opacity:0;transform:translateY(-10px)}}

        .modal{
            position:fixed;inset:0;background:rgba(0,0,0,0.7);
            backdrop-filter:blur(8px);z-index:200;
            display:flex;align-items:center;justify-content:center;
        }
        .modal-box{
            background:rgba(30,30,50,0.95);border:1px solid var(--border);
            border-radius:20px;padding:24px;max-width:500px;width:90%;
            max-height:80vh;overflow-y:auto;
        }
        .modal-box h3{margin-bottom:12px}
        .modal-box label{display:block;font-weight:600;margin:6px 0 2px;font-size:.8rem;color:var(--text2)}
        .modal-box input,.modal-box textarea,.modal-box select{
            width:100%;padding:8px;margin:4px 0;
            background:rgba(255,255,255,0.05);border:1px solid var(--border);
            border-radius:10px;color:var(--text);font-family:inherit;font-size:.9rem;
        }
        .modal-box input:focus,.modal-box textarea:focus,.modal-box select:focus{
            outline:none;border-color:var(--purple);
        }

        @media(max-width:768px){
            .sidebar{width:100%}
            .upload-box{padding:30px 20px}
            .menu-btn{left:10px;width:38px;height:38px}
        }
    </style>
</head>
<body>

<!-- Loading -->
<div class="loading-overlay" id="loading">
    <div class="spinner"></div>
    <div class="loading-text" id="loadingText">Đang xử lý...</div>
</div>

<!-- Upload -->
<div class="upload-screen" id="uploadScreen">
    <div class="upload-box" id="uploadBox">
        <div class="upload-icon">📂</div>
        <div class="upload-title">Trắc nghiệm Pro</div>
        <div class="upload-subtitle">Kéo thả hoặc click để upload file .docx</div>
        <button class="btn btn-primary" onclick="document.getElementById('fileInput').click()">📥 Chọn file Word</button>
        <div class="file-name" id="fileName"></div>
    </div>
    <input type="file" id="fileInput" accept=".docx">
</div>

<!-- App -->
<div class="app" id="app">
    <div class="top-bar">
        <div class="logo">📘 Trắc nghiệm Pro <span class="stats" id="stats">0/0</span></div>
        <div class="action-group" id="actions">
            <button class="btn btn-primary btn-sm" onclick="createExam()">📌 Tạo đề</button>
            <button class="btn btn-outline btn-sm" onclick="resetAnswers()">🔄 Reset</button>
            <button class="btn btn-outline btn-sm" onclick="addQuestion()">➕ Thêm</button>
            <button class="btn btn-outline btn-sm" onclick="document.getElementById('fileInput2').click()">📂 Upload lại</button>
            <input type="file" id="fileInput2" accept=".docx">
        </div>
    </div>
    <div class="left-panel" id="panel"></div>
</div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <div id="sidebarContent"></div>
</div>

<!-- Menu -->
<button class="menu-btn" id="menuBtn" title="Tab để mở">☰</button>

<!-- Scroll to top -->
<button class="back-to-top" id="backToTop" title="Lên đầu">↑</button>

<script>
// ============ GLOBAL ============
let questions = [], exams = [];
let currentMode = 'teacher';
let currentExam = null;
let userAnswers = {};
let submitted = false;
let results = [];
let currentFilter = 'all';
const STORAGE = 'quiz_data_v4';
const $ = id => document.getElementById(id);

function save() { localStorage.setItem(STORAGE, JSON.stringify(exams)); }
function load() { try { exams = JSON.parse(localStorage.getItem(STORAGE)) || []; } catch(e) { exams = []; } }
function notify(msg) {
    const t = document.createElement('div');
    t.className = 'toast'; t.textContent = msg;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 2300);
}
function showLoading(msg) { $('loadingText').textContent = msg; $('loading').classList.add('show'); }
function hideLoading() { $('loading').classList.remove('show'); }

// ============ PARSE ============
function parseQuestions(text) {
    text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
    const lines = text.split('\n').map(l => l.trim()).filter(l => l);
    const blocks = [];
    let current = null;

    for (const line of lines) {
        let m = line.match(/^(?:Câu|câu)\s*(\d+)[:.]?\s*(.*)/i);
        if (!m) {
            m = line.match(/^(\d+)[:.]\s+(.+)/);
            if (m && parseInt(m[1]) >= 1 && parseInt(m[1]) <= 200) m = [m[0], m[1], m[2]];
            else m = null;
        }
        if (m) {
            if (current) blocks.push(current);
            current = { num: parseInt(m[1]), content: [m[2] || ''] };
        } else if (current) {
            current.content.push(line);
        }
    }
    if (current) blocks.push(current);

    const result = [];
    for (const block of blocks) {
        const full = block.content.join(' ');
        let options = [];
        const optRegex = /([A-D])\.\s+(.*?)(?=\s+[A-D]\.\s|$)/g;
        let m;
        while ((m = optRegex.exec(full)) !== null) {
            const label = m[1];
            if (!options.find(o => o.label === label)) options.push({ label, content: m[2].trim() });
        }
        if (options.length < 2) {
            options = [];
            for (const line of block.content) {
                const om = line.match(/^([A-D])\.\s+(.+)/);
                if (om) options.push({ label: om[1], content: om[2].trim() });
            }
        }
        if (options.length < 2) {
            const parts = full.split(/\s+[A-D]\.\s+/);
            if (parts.length >= 5) {
                options = [
                    { label: 'A', content: parts[1].trim() },
                    { label: 'B', content: parts[2].trim() },
                    { label: 'C', content: parts[3].trim() },
                    { label: 'D', content: parts[4].trim() }
                ];
            }
        }

        if (options.length >= 2) {
            let qText = full;
            const idx = full.search(/[A-D]\./);
            if (idx > 0) qText = full.substring(0, idx).trim();
            const seen = new Set();
            let filtered = [];
            for (const o of options) { if (!seen.has(o.label)) { seen.add(o.label); filtered.push(o); } }
            while (filtered.length < 4) { const labels = ['A','B','C','D']; const missing = labels.find(l => !seen.has(l)); if (missing) { filtered.push({ label: missing, content: '' }); seen.add(missing); } else break; }
            filtered.sort((a,b) => a.label.localeCompare(b.label));
            result.push({ id: block.num, text: qText || `Câu ${block.num}`, options: filtered.slice(0,4), correct: null });
        }
    }
    result.sort((a,b) => a.id - b.id);
    result.forEach((q,i) => q.id = i + 1);
    return result;
}

// ============ LOAD FILE ============
async function loadFile(file) {
    showLoading('Đang đọc file...');
    try {
        const buf = await file.arrayBuffer();
        const result = await mammoth.extractRawText({ arrayBuffer: buf });
        const text = result.value;
        if (!text || text.length < 10) throw new Error('File rỗng');
        const parsed = parseQuestions(text);
        if (!parsed.length) throw new Error('Không tìm thấy câu hỏi');
        questions = parsed;
        hideLoading();
        $('uploadScreen').style.display = 'none';
        $('app').style.display = 'block';
        renderTeacher();
        notify(`✅ Đã tải ${parsed.length} câu hỏi`);
    } catch(e) {
        hideLoading();
        notify('❌ ' + e.message);
    }
}

// ============ SCROLL TO TOP ============
function setupScrollToTop() {
    const panel = $('panel');
    const btn = $('backToTop');
    
    panel.addEventListener('scroll', function() {
        if (panel.scrollTop > 200) {
            btn.classList.add('show');
        } else {
            btn.classList.remove('show');
        }
    });
    
    btn.onclick = function() {
        panel.scrollTo({ top: 0, behavior: 'smooth' });
    };
}

// ============ UPDATE STATS ============
function updateStats() {
    const a = questions.filter(q => q.correct).length;
    $('stats').textContent = `${a}/${questions.length}`;
}

// ============ SET CORRECT ============
function setCorrect(idx, letter) {
    if (currentMode !== 'teacher') return;
    questions[idx].correct = letter;
    const card = $('q_' + idx);
    if (card) {
        card.querySelectorAll('.opt').forEach(o => {
            o.classList.remove('correct-answer');
            if (o.getAttribute('data-letter') === letter) o.classList.add('correct-answer');
        });
        const badge = card.querySelector('.answer-badge');
        badge.textContent = '✅ ' + letter;
        badge.className = 'answer-badge set';
    }
    updateStats();
}

// ============ RENDER TEACHER ============
function renderTeacher() {
    currentMode = 'teacher';
    currentExam = null;
    userAnswers = {};
    submitted = false;
    results = [];
    $('actions').style.display = 'flex';
    updateStats();

    let sideHtml = '<h3 style="margin-bottom:12px;color:var(--text)">📋 Đề thi</h3>';
    if (exams.length) {
        exams.forEach(ex => {
            sideHtml += `<div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
                <div><b>${ex.name}</b><br><small style="color:var(--text2)">${ex.code} - ${ex.questions.length} câu</small></div>
                <div style="display:flex;gap:4px">
                    <button class="btn btn-outline btn-sm" onclick="exportExam(${ex.id})">📥</button>
                    <button class="btn btn-primary btn-sm" onclick="doExam(${ex.id})">🎯</button>
                </div>
            </div>`;
        });
        sideHtml += '<button class="btn btn-outline btn-sm" style="width:100%;margin-top:8px;color:var(--red)" onclick="deleteExams()">🗑 Xóa đề</button>';
    } else {
        sideHtml += '<div style="color:var(--text2);text-align:center;padding:20px">Chưa có đề</div>';
    }
    $('sidebarContent').innerHTML = sideHtml;

    if (!questions.length) {
        $('panel').innerHTML = '<div style="text-align:center;padding:60px;color:var(--text2)"><div style="font-size:3rem;margin-bottom:12px">📂</div>Chưa có câu hỏi</div>';
        return;
    }
    let html = '';
    questions.forEach((q, idx) => {
        const opts = q.options.map(opt =>
            `<div class="opt ${q.correct === opt.label ? 'correct-answer' : ''}" data-letter="${opt.label}" onclick="setCorrect(${idx},'${opt.label}')">
                <span class="opt-letter">${opt.label}</span>
                <span>${opt.content || '(Trống)'}</span>
            </div>`
        ).join('');
        html += `<div class="q-card" id="q_${idx}">
            <div class="q-text">Câu ${q.id}: ${q.text}</div>
            <div class="options">${opts}</div>
            <div class="answer-badge ${q.correct ? 'set' : 'unset'}">${q.correct ? '✅ ' + q.correct : '⚡ Chưa chọn'}</div>
            <div style="margin-top:8px;display:flex;gap:6px">
                <button class="btn btn-outline btn-sm" onclick="editQ(${idx})">✏️ Sửa</button>
                <button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="deleteQ(${idx})">🗑</button>
            </div>
        </div>`;
    });
    $('panel').innerHTML = html;
    setupScrollToTop();
}

// ============ EDIT / DELETE ============
function editQ(idx) {
    const q = questions[idx];
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<div class="modal-box">
        <h3>✏️ Sửa câu ${idx + 1}</h3>
        <label>Nội dung:</label><textarea id="et" rows="3">${q.text}</textarea>
        ${q.options.map((o,i) => `<label>Đáp án ${['A','B','C','D'][i]}:</label><input id="e${i}" value="${o.content || ''}">`).join('')}
        <label>Đáp án đúng:</label>
        <select id="ec"><option value="">-- Chọn --</option>${['A','B','C','D'].map(l => `<option value="${l}" ${q.correct===l?'selected':''}>${l}</option>`).join('')}</select>
        <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:16px">
            <button class="btn btn-outline btn-sm" onclick="this.closest('.modal').remove()">Hủy</button>
            <button class="btn btn-primary btn-sm" id="saveEdit">Lưu</button>
        </div>
    </div>`;
    document.body.appendChild(modal);
    modal.querySelector('#saveEdit').onclick = () => {
        q.text = modal.querySelector('#et').value.trim() || q.text;
        q.options.forEach((o,i) => o.content = modal.querySelector('#e'+i).value.trim());
        q.correct = modal.querySelector('#ec').value || null;
        modal.remove();
        renderTeacher();
        notify('✅ Đã lưu');
    };
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function deleteQ(idx) {
    if (!confirm(`Xóa câu ${idx + 1}?`)) return;
    questions.splice(idx, 1);
    questions.forEach((q,i) => q.id = i + 1);
    renderTeacher();
    notify('🗑 Đã xóa');
}

// ============ EXAMS ============
function createExam() {
    if (!questions.length) return notify('❌ Chưa có câu hỏi');
    const name = prompt('Tên đề:', 'Đề ' + new Date().toLocaleDateString('vi-VN'));
    if (!name) return;
    exams.unshift({ id: Date.now(), name, code: Math.random().toString(36).substring(2,8).toUpperCase(), questions: JSON.parse(JSON.stringify(questions)) });
    save();
    renderTeacher();
    notify('✅ Đã tạo: ' + name);
}

function deleteExams() {
    if (!exams.length) return notify('Không có đề');
    const modal = document.createElement('div');
    modal.className = 'modal';
    modal.innerHTML = `<div class="modal-box">
        <h3>🗑 Xóa đề</h3>
        <div style="max-height:300px;overflow-y:auto;margin:12px 0">
            ${exams.map(e => `<label style="display:flex;align-items:center;gap:8px;margin:4px 0;cursor:pointer"><input type="checkbox" value="${e.id}"> ${e.name} (${e.code})</label>`).join('')}
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
            <button class="btn btn-outline btn-sm" onclick="this.closest('.modal').remove()">Hủy</button>
            <button class="btn btn-outline btn-sm" style="color:var(--red)" id="delSel">Xóa đã chọn</button>
            <button class="btn btn-outline btn-sm" style="color:var(--red)" id="delAll">Xóa tất cả</button>
        </div>
    </div>`;
    document.body.appendChild(modal);
    modal.querySelector('#delAll').onclick = () => {
        if (confirm('Xóa TẤT CẢ?')) { exams = []; save(); renderTeacher(); modal.remove(); notify('Đã xóa hết'); }
    };
    modal.querySelector('#delSel').onclick = () => {
        const ids = [...modal.querySelectorAll('input:checked')].map(i => parseInt(i.value));
        if (!ids.length) return notify('Chưa chọn');
        exams = exams.filter(e => !ids.includes(e.id));
        save(); renderTeacher(); modal.remove();
        notify('Đã xóa ' + ids.length + ' đề');
    };
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
}

function resetAnswers() {
    if (!confirm('Reset tất cả đáp án?')) return;
    questions.forEach(q => q.correct = null);
    renderTeacher();
    notify('🔄 Đã reset');
}

function addQuestion() {
    questions.push({
        id: questions.length + 1,
        text: 'Nhập nội dung câu hỏi',
        options: [{label:'A',content:''},{label:'B',content:''},{label:'C',content:''},{label:'D',content:''}],
        correct: null
    });
    renderTeacher();
    // Tự scroll đến câu mới
    setTimeout(() => {
        const lastCard = $('panel').querySelector('.q-card:last-child');
        if (lastCard) lastCard.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 100);
    notify('➕ Đã thêm');
}

</style></head><body><div class="cont"><div class="head"><h1>📝 ${ex.name}</h1><div style="color:#94a3b8;font-size:.85rem">Mã đề: ${ex.code}</div></div><div class="mw" style="display:flex;gap:16px;flex-wrap:wrap"><div class="qa" id="qa" style="flex:1"></div></div><div class="nw"><button class="nt" id="ntb" title="Thu/Phóng (Tab)">◀</button><div class="nav" id="nb"></div></div><button class="btop" id="btop" title="Lên đầu">↑</button></div><script>

// ============ DO EXAM ============
function doExam(id) {
    const ex = exams.find(e => e.id === id);
    if (!ex) return;
    currentMode = 'doing';
    currentExam = ex;
    userAnswers = {};
    submitted = false;
    results = [];
    currentFilter = 'all';

    $('actions').style.display = 'none';

    // Sidebar có nút Nộp bài
    $('sidebarContent').innerHTML = `
        <h3 style="margin-bottom:12px;color:var(--text)">📑 Điều hướng</h3>
        <div class="nav-circles" id="navCircles" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">
            ${ex.questions.map((_,i) => `<div class="nav-circle" id="nav_${i}" onclick="scrollToQ(${i})">${i+1}</div>`).join('')}
        </div>
        <div class="filter-buttons" id="filterBtns" style="display:flex;gap:4px;justify-content:center;margin-top:12px;flex-wrap:wrap"></div>
        <button class="submit-btn" id="submitSidebarBtn" onclick="submitExam()" style="margin-top:16px">✅ Nộp bài</button>
        <div id="submitArea" style="margin-top:12px"></div>`;

    renderExamUI();
}

function scrollToQ(i) {
    const card = $('q_' + i);
    if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function updateNav() {
    if (currentMode !== 'doing' || !currentExam) return;
    currentExam.questions.forEach((_, i) => {
        const nav = $('nav_' + i);
        if (nav) {
            if (userAnswers[i]) nav.classList.add('answered');
            else nav.classList.remove('answered');
        }
    });
}

function renderExamUI() {
    if (!currentExam) return;
    const ex = currentExam;

    let html = ex.questions.map((q, i) => `
        <div class="q-card" id="q_${i}">
            <div class="q-text">Câu ${i+1}: ${q.text}</div>
            <div class="options">
                ${q.options.map(o => `
                    <div class="opt ${userAnswers[i] === o.label ? 'selected-answer' : ''}" 
                         id="opt_${i}_${o.label}"
                         data-i="${i}" data-l="${o.label}"
                         onclick="selectOption(${i},'${o.label}')">
                        <span class="opt-letter">${o.label}</span>
                        <span>${o.content || '(Trống)'}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');

    html += `<div id="resultArea"></div>`;
    html += `<div style="text-align:center;margin-top:12px">
        <button class="btn btn-outline btn-sm" onclick="backToTeacher()">← Quay về</button>
    </div>`;

    $('panel').innerHTML = html;
    setupScrollToTop();
    
    // Reset sidebar submit button
    const sb = $('submitSidebarBtn');
    if (sb) { sb.style.display = 'block'; sb.textContent = '✅ Nộp bài'; sb.onclick = submitExam; }
    $('submitArea').innerHTML = '';
    $('filterBtns').innerHTML = '';
}

function selectOption(i, label) {
    if (submitted || currentMode !== 'doing') return;
    userAnswers[i] = label;

    const card = $('q_' + i);
    if (card) {
        card.querySelectorAll('.opt').forEach(o => {
            o.classList.remove('selected-answer');
            if (o.getAttribute('data-l') === label) o.classList.add('selected-answer');
        });
    }
    const nav = $('nav_' + i);
    if (nav) nav.classList.add('answered');
}

function submitExam() {
    if (submitted || !currentExam) return;
    submitted = true;
    const ex = currentExam;

    let correct = 0;
    results = [];

    ex.questions.forEach((q, i) => {
        const isCorrect = (q.correct && userAnswers[i] === q.correct);
        if (isCorrect) correct++;
        results.push({ isCorrect, correct: q.correct });

        const card = $('q_' + i);
        if (card) {
            card.classList.add(isCorrect ? 'correct-card' : 'wrong-card');
            if (q.correct) {
                const correctOpt = $('opt_' + i + '_' + q.correct);
                if (correctOpt) correctOpt.classList.add('correct-answer');
            }
        }
    });

    const score = (correct / ex.questions.length * 10).toFixed(2);
    const wrong = ex.questions.length - correct;

    // Update nav
    ex.questions.forEach((_, i) => {
        const nav = $('nav_' + i);
        if (nav) nav.className = 'nav-circle ' + (results[i].isCorrect ? 'result-correct' : 'result-wrong');
    });

    // Filter buttons
    const fb = $('filterBtns');
    if (fb) {
        fb.innerHTML = `
            <button class="filter-btn active" onclick="filterCards('all')">📋 Tất cả</button>
            <button class="filter-btn" onclick="filterCards('correct')">✅ Đúng (${correct})</button>
            <button class="filter-btn" onclick="filterCards('wrong')">❌ Sai (${wrong})</button>
        `;
    }

    // Result
    $('resultArea').innerHTML = `
        <div style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;text-align:center;margin-top:12px">
            <div style="font-size:2rem;font-weight:800;background:linear-gradient(135deg,#a29bfe,#55efc4);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🏆 ${score}/10</div>
            <div style="margin:8px 0">✅ Đúng ${correct}/${ex.questions.length}</div>
            <button class="btn btn-outline btn-sm" onclick="retryExam()" style="margin-top:8px">🔄 Làm lại</button>
        </div>
    `;

    // Update sidebar
    $('submitArea').innerHTML = `
        <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;text-align:center;margin-top:12px">
            <div style="font-weight:700;color:#a29bfe">🏆 ${score}/10</div>
            <div style="font-size:0.75rem;color:var(--text2)">${correct}/${ex.questions.length} đúng</div>
        </div>
    `;
    const sb = $('submitSidebarBtn');
    if (sb) sb.style.display = 'none';

    // Re-bind nav
    ex.questions.forEach((_, i) => {
        const nav = $('nav_' + i);
        if (nav) nav.onclick = () => scrollToQ(i);
    });
}

function filterCards(type) {
    currentFilter = type;
    document.querySelectorAll('#filterBtns .filter-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');

    document.querySelectorAll('#panel .q-card').forEach((card, i) => {
        if (type === 'all') card.classList.remove('hidden');
        else if (type === 'correct') results[i]?.isCorrect ? card.classList.remove('hidden') : card.classList.add('hidden');
        else results[i] && !results[i].isCorrect ? card.classList.remove('hidden') : card.classList.add('hidden');
    });
}

function retryExam() {
    userAnswers = {};
    submitted = false;
    results = [];
    renderExamUI();
    if (currentExam) {
        currentExam.questions.forEach((_, i) => {
            const nav = $('nav_' + i);
            if (nav) { nav.className = 'nav-circle'; nav.onclick = () => scrollToQ(i); }
        });
    }
    $('filterBtns').innerHTML = '';
    $('resultArea').innerHTML = '';
    $('submitArea').innerHTML = '';
    const sb = $('submitSidebarBtn');
    if (sb) { sb.style.display = 'block'; sb.textContent = '✅ Nộp bài'; sb.onclick = submitExam; }
}

function backToTeacher() {
    currentMode = 'teacher';
    currentExam = null;
    userAnswers = {};
    submitted = false;
    results = [];
    renderTeacher();
}

// ============ KEYBOARD SHORTCUT ============
document.addEventListener('keydown', function(e) {
    // Tab mở sidebar
    if (e.key === 'Tab') {
        e.preventDefault();
        $('sidebar').classList.toggle('open');
    }
    // Escape đóng
    if (e.key === 'Escape') {
        $('sidebar').classList.remove('open');
        document.querySelectorAll('.modal').forEach(m => m.remove());
    }
});

// ============ INIT ============
load();

$('fileInput').addEventListener('change', async e => {
    if (e.target.files[0]) {
        $('fileName').textContent = e.target.files[0].name;
        await loadFile(e.target.files[0]);
    }
});

$('fileInput2').addEventListener('change', async e => {
    if (e.target.files[0]) await loadFile(e.target.files[0]);
});

// Drag & drop
const uploadBox = $('uploadBox');
uploadBox.addEventListener('dragover', e => { e.preventDefault(); uploadBox.classList.add('drag-over'); });
uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag-over'));
uploadBox.addEventListener('drop', async e => {
    e.preventDefault();
    uploadBox.classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.name.endsWith('.docx')) {
        $('fileName').textContent = file.name;
        await loadFile(file);
    }
});
document.addEventListener('dragover', e => e.preventDefault());
document.addEventListener('drop', e => e.preventDefault());

// Close sidebar on outside click
document.addEventListener('click', e => {
    const sidebar = $('sidebar');
    if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== $('menuBtn') && !$('menuBtn').contains(e.target)) {
        sidebar.classList.remove('open');
    }
});

// Init
if (questions.length) {
    $('uploadScreen').style.display = 'none';
    $('app').style.display = 'block';
    renderTeacher();
}

$('menuBtn').addEventListener('click', () => $('sidebar').classList.toggle('open'));
</script>
</body>
</html>
