<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LightQuiz</title>
    <script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js">
    </script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js">
    </script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js">
    </script>
    <style>
        :root {
            --bg: #0f0f1e;
            --surface: rgba(255, 255, 255, 0.04);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e2e8f0;
            --text2: #94a3b8;
            --purple: #6c5ce7;
            --purple2: #a29bfe;
            --green: #00b894;
            --red: #ff6b6b;
            --yellow: #fdcb6e;
            --yellow2: #f39c12;
            --radius: 18px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        html {
            scroll-behavior: smooth
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #0f0f1e, #1a1a2e);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(108, 92, 231, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(253, 203, 110, 0.06) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        .upload-screen {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .upload-box {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            transition: transform .25s, box-shadow .25s;
        }

        .upload-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 30px 80px rgba(253, 203, 110, 0.2)
        }

        .upload-box.drag-over {
            border-color: var(--yellow);
            background: rgba(253, 203, 110, 0.08)
        }

        .upload-icon {
            font-size: 4rem;
            margin-bottom: 16px;
            display: inline-block;
            animation: bulbGlow 2s ease-in-out infinite;
        }

        @keyframes bulbGlow {
            0%,
            100% {
                text-shadow: 0 0 20px rgba(253, 203, 110, 0.3), 0 0 40px rgba(253, 203, 110, 0.1);
                transform: scale(1);
            }
            50% {
                text-shadow: 0 0 40px rgba(253, 203, 110, 0.8), 0 0 80px rgba(253, 203, 110, 0.4), 0 0 120px rgba(253, 203, 110, 0.2);
                transform: scale(1.08);
            }
        }

        .logo-text {
            display: inline-block;
            background: linear-gradient(135deg, #fdcb6e, #f39c12, #fdcb6e);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2s ease-in-out infinite, glowPulse 2s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%,
            100% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
        }

        @keyframes glowPulse {
            0%,
            100% {
                filter: drop-shadow(0 0 8px rgba(253, 203, 110, 0.4));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(253, 203, 110, 0.9));
            }
        }

        .upload-title {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 4px;
        }

        .upload-subtitle {
            color: var(--text2);
            font-size: .9rem;
            margin: 12px 0 24px
        }

        .btn {
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all .15s;
            font-size: .9rem;
        }

        .btn:active {
            transform: scale(.96)
        }

        .btn-primary {
            background: linear-gradient(135deg, #fdcb6e, #f39c12);
            color: #1a1a2e;
            box-shadow: 0 4px 20px rgba(253, 203, 110, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 8px 30px rgba(253, 203, 110, 0.5);
            transform: translateY(-2px)
        }

        .btn-outline {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text);
        }

        .btn-outline:hover {
            background: rgba(255, 255, 255, 0.1)
        }

        .btn-sm {
            padding: 6px 14px;
            font-size: .75rem
        }

        .btn-gold {
            background: linear-gradient(135deg, #fdcb6e, #f39c12, #fdcb6e);
            background-size: 200% 200%;
            color: #1a1a2e;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: .9rem;
            animation: goldShimmer 2s ease-in-out infinite;
            box-shadow: 0 4px 20px rgba(253, 203, 110, 0.4);
        }

        .btn-gold:hover {
            box-shadow: 0 8px 35px rgba(253, 203, 110, 0.7);
            transform: translateY(-2px);
        }

        .btn-gold:active {
            transform: scale(0.96);
        }

        @keyframes goldShimmer {
            0%,
            100% {
                background-position: 0% 50%;
                box-shadow: 0 4px 20px rgba(253, 203, 110, 0.4);
            }
            50% {
                background-position: 100% 50%;
                box-shadow: 0 8px 40px rgba(253, 203, 110, 0.8);
            }
        }

        .file-name {
            margin-top: 16px;
            color: var(--yellow);
            font-weight: 600;
            font-size: .85rem
        }

        #fileInput,
        #fileInput2 {
            display: none
        }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 15, 30, 0.9);
            backdrop-filter: blur(10px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 20px;
        }

        .loading-overlay.show {
            display: flex
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--yellow);
            border-radius: 50%;
            animation: spin .7s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .loading-text {
            font-weight: 600;
            color: var(--text)
        }

        .main-app {
            display: none;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            position: relative;
            z-index: 1
        }

        .top-bar {
            background: var(--surface);
            backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 16px;
            position: sticky;
            top: 16px;
            z-index: 50;
        }

        .logo {
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            font-size: 1.5rem;
            display: inline-block;
            animation: bulbGlow 2s ease-in-out infinite;
        }

        .logo-name {
            font-size: 1.2rem;
            display: inline-block;
            background: linear-gradient(135deg, #fdcb6e, #f39c12, #fdcb6e);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmer 2s ease-in-out infinite, glowPulse 2s ease-in-out infinite;
        }

        .stats {
            background: rgba(253, 203, 110, 0.15);
            color: var(--yellow);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 600;
        }

        .action-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap
        }

        .left-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            max-height: 75vh;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .left-panel::-webkit-scrollbar {
            width: 4px
        }

        .left-panel::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 10px
        }

        .q-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 12px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeSlideIn 0.4s ease-out;
        }

        @keyframes fadeSlideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .q-card:hover {
            border-color: rgba(255, 255, 255, 0.12)
        }

        .q-card.hidden {
            display: none
        }

        .q-card.correct-card {
            border-left: 3px solid var(--green);
            background: rgba(0, 184, 148, 0.05);
            animation: correctPulse 0.6s ease-out;
        }

        @keyframes correctPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(0, 184, 148, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(0, 184, 148, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(0, 184, 148, 0);
            }
        }

        .q-card.wrong-card {
            border-left: 3px solid var(--red);
            background: rgba(255, 107, 107, 0.05);
            animation: wrongShake 0.5s ease-out;
        }

        @keyframes wrongShake {
            0%,
            100% {
                transform: translateX(0);
            }
            20% {
                transform: translateX(-8px);
            }
            40% {
                transform: translateX(8px);
            }
            60% {
                transform: translateX(-4px);
            }
            80% {
                transform: translateX(4px);
            }
        }

        .q-text {
            font-weight: 700;
            margin-bottom: 12px;
            line-height: 1.6;
            white-space: pre-wrap
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 6px
        }

        .opt {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .opt:hover {
            background: rgba(255, 255, 255, 0.06);
            transform: translateX(4px);
        }

        .opt:active {
            transform: scale(0.98);
        }

        .opt-letter {
            font-weight: 800;
            width: 32px;
            height: 32px;
            background: rgba(253, 203, 110, 0.2);
            color: var(--yellow);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: all 0.3s ease;
        }

        .opt.correct-answer {
            background: rgba(0, 184, 148, 0.15);
            border-color: rgba(0, 184, 148, 0.3);
            animation: highlightCorrect 0.5s ease-out;
        }

        @keyframes highlightCorrect {
            0% {
                background: rgba(0, 184, 148, 0.4);
            }
            100% {
                background: rgba(0, 184, 148, 0.15);
            }
        }

        .opt.correct-answer .opt-letter {
            background: var(--green);
            color: #fff;
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            0% {
                transform: scale(0);
            }
            80% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }

        .opt.selected-answer {
            background: rgba(253, 203, 110, 0.25);
            border-color: rgba(253, 203, 110, 0.5);
            animation: selectGlow 0.3s ease-out;
        }

        @keyframes selectGlow {
            0% {
                box-shadow: 0 0 0 0 rgba(253, 203, 110, 0.4);
            }
            100% {
                box-shadow: 0 0 20px 5px rgba(253, 203, 110, 0);
            }
        }

        .opt.selected-answer .opt-letter {
            background: #fff;
            color: #1a1a2e;
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .answer-badge {
            display: inline-block;
            margin-top: 8px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: .75rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .answer-badge.set {
            background: rgba(0, 184, 148, 0.15);
            color: #55efc4
        }

        .answer-badge.unset {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text2)
        }

        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 380px;
            height: 100%;
            background: rgba(15, 15, 30, 0.95);
            backdrop-filter: blur(30px);
            border-left: 1px solid var(--border);
            z-index: 99;
            transform: translateX(100%);
            transition: transform .25s;
            padding: 20px;
            overflow-y: auto;
            scroll-behavior: smooth;
        }

        .sidebar.open {
            transform: translateX(0)
        }

        .menu-btn {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 44px;
            height: 44px;
            border-radius: 14px;
            background: rgba(253, 203, 110, 0.2);
            border: 1px solid rgba(253, 203, 110, 0.3);
            color: var(--yellow);
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 98;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all .2s;
        }

        .menu-btn:hover {
            background: rgba(253, 203, 110, 0.3)
        }

        .nav-circle {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 3px;
            cursor: pointer;
            font-size: .7rem;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--text2);
        }

        .nav-circle:hover {
            background: rgba(255, 255, 255, 0.1);
            transform: scale(1.1);
        }

        .nav-circle.answered {
            background: var(--green);
            color: #fff;
            border-color: var(--green);
            animation: popIn 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .nav-circle.result-correct {
            background: var(--green);
            color: #fff;
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        .nav-circle.result-wrong {
            background: var(--red);
            color: #fff;
            animation: wrongShake 0.5s ease-out;
        }

        .filter-btn {
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
            color: var(--text2);
            cursor: pointer;
            font-size: .7rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .filter-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateY(-1px);
        }

        .filter-btn.active {
            background: rgba(253, 203, 110, 0.3);
            border-color: rgba(253, 203, 110, 0.5);
            color: var(--yellow);
            animation: selectGlow 0.3s ease-out;
        }

        .submit-btn {
            background: linear-gradient(135deg, #fdcb6e, #f39c12);
            color: #1a1a2e;
            border: none;
            padding: 14px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            transition: all 0.2s ease;
        }

        .submit-btn:hover {
            box-shadow: 0 8px 30px rgba(253, 203, 110, 0.4);
            transform: translateY(-2px);
        }

        .submit-btn:active {
            transform: scale(0.96);
        }

        .result-card {
            animation: slideDown 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
                max-height: 0;
            }
            to {
                opacity: 1;
                transform: translateY(0);
                max-height: 500px;
            }
        }

        .back-to-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(253, 203, 110, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1.2rem;
            cursor: pointer;
            z-index: 90;
            display: none;
            align-items: center;
            justify-content: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
        }

        .back-to-top:hover {
            background: rgba(253, 203, 110, 0.5);
            transform: translateY(-2px);
        }

        .back-to-top.show {
            display: flex;
            animation: fadeSlideIn 0.3s ease-out;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(30, 30, 50, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            padding: 12px 24px;
            border-radius: 50px;
            z-index: 300;
            font-weight: 600;
            font-size: .85rem;
            animation: slideIn .3s ease, fadeOut .3s 2s ease forwards;
            pointer-events: none;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateX(30px)
            }
            to {
                opacity: 1;
                transform: translateX(0)
            }
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translateY(-10px)
            }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            z-index: 250;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .modal-dialog {
            background: rgba(30, 30, 50, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            max-width: 440px;
            width: 90%;
            text-align: center;
            animation: modalPop 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(253, 203, 110, 0.1);
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-dialog h3 {
            font-size: 1.3rem;
            margin-bottom: 16px;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .modal-dialog .modal-icon {
            font-size: 1.5rem;
            animation: bulbGlow 2s ease-in-out infinite;
        }

        .modal-dialog input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s ease;
            text-align: center;
        }

        .modal-dialog input:focus {
            outline: none;
            border-color: var(--yellow);
            box-shadow: 0 0 20px rgba(253, 203, 110, 0.2);
        }

        .modal-dialog input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .modal-dialog .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .modal-dialog .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text2);
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .modal-dialog .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .modal-dialog .btn-gold-modal {
            background: linear-gradient(135deg, #fdcb6e, #f39c12, #fdcb6e);
            background-size: 200% 200%;
            color: #1a1a2e;
            border: none;
            padding: 10px 24px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 700;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            animation: goldShimmer 2s ease-in-out infinite;
            box-shadow: 0 4px 20px rgba(253, 203, 110, 0.4);
        }

        .modal-dialog .btn-gold-modal:hover {
            box-shadow: 0 8px 35px rgba(253, 203, 110, 0.7);
            transform: translateY(-2px);
        }

        .modal-dialog .btn-gold-modal:active {
            transform: scale(0.96);
        }

        .modal-dialog.danger {
            border-color: rgba(255, 107, 107, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 107, 107, 0.1);
        }

    <script>
        // ============ GLOBAL ============
        let questions = [],

        let currentExam = null;
        let userAnswers = {};
        let submitted = false;
        let results = [];
        let currentFilter = 'all';
        const $ = id => document.getElementById(id);

        // ============ FIREBASE KHỞI TẠO ============
const firebaseConfig = {
    apiKey: "AIzaSyDof7yrO0Z9YazsfHtevfid2nFwYB9_03Y",
    authDomain: "lightquiz-app.firebaseapp.com",
    databaseURL: "https://lightquiz-app-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "lightquiz-app",
    storageBucket: "lightquiz-app.firebasestorage.app",
    messagingSenderId: "610026189000",
    appId: "1:610026189000:web:d4f417e7ab380d8f3b35fd"
};

// Khởi tạo Firebase App
firebase.initializeApp(firebaseConfig);

// Khởi tạo dịch vụ
const db = firebase.database();
const auth = firebase.auth();
auth.useDeviceLanguage(); // Thông báo lỗi tiếng Việt

let currentUser = null;
let userExamsRef = null;

// ============ KIỂM TRA TRẠNG THÁI ĐĂNG NHẬP ============
auth.onAuthStateChanged(user => {
    console.log('Auth state changed:', user ? `Đã đăng nhập: ${user.email}` : 'Chưa đăng nhập');
    
    if (user) {
        // Người dùng đã đăng nhập
        currentUser = user;
        userExamsRef = db.ref('users/' + user.uid + '/exams');
        
        // Ẩn màn hình đăng nhập, hiện ứng dụng chính
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'block';
        document.getElementById('userBar').style.display = 'flex';
        document.getElementById('uploadScreen').style.display = 'none';
        
        // Cập nhật thông tin hiển thị
        document.getElementById('userName').textContent = user.email;
        document.getElementById('userInitial').textContent = (user.email || 'U')[0].toUpperCase();
        
        // Tải đề thi của người dùng
        loadUserExams();
    } else {
        // Không có người dùng đăng nhập
        currentUser = null;
        userExamsRef = null;
        exams = [];
        
        // Hiện màn hình đăng nhập, ẩn ứng dụng
        document.getElementById('authScreen').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('userBar').style.display = 'none';
    }
});

function loadUserExams() {
    if (!userExamsRef) return;
    
    userExamsRef.on('value', snap => {
        const data = snap.val() || {};
        exams = Object.values(data).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
        console.log('Đã tải ' + Object.keys(data).length + ' đề thi');
        
        // Chỉ render nếu đang ở chế độ teacher
        if (currentMode === 'teacher') {
            renderTeacher();
        }
    }, error => {
        console.error('Lỗi tải đề thi:', error);
        notify('❌ Lỗi tải dữ liệu từ máy chủ');
    });
}

// ============ CHUYỂN TAB ĐĂNG NHẬP/ĐĂNG KÝ ============
function switchTab(tab) {
    document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
    document.getElementById('loginError').classList.remove('show');
    document.getElementById('regError').classList.remove('show');
    
    if (tab === 'login') {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        document.querySelector('.auth-tab:nth-child(1)').classList.add('active');
    } else {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
        document.querySelector('.auth-tab:nth-child(2)').classList.add('active');
    }
}

// ============ ĐĂNG NHẬP ============
function login() {
    const email = document.getElementById('loginEmail').value.trim();
    const pass = document.getElementById('loginPass').value;
    const err = document.getElementById('loginError');
    const btn = document.querySelector('#loginForm .btn-gold');
    
    // Reset thông báo lỗi
    err.classList.remove('show');
    
    // Kiểm tra dữ liệu đầu vào
    if (!email || !pass) { 
        err.textContent = '❌ Vui lòng nhập đầy đủ email và mật khẩu'; 
        err.classList.add('show'); 
        return; 
    }
    
    // Hiển thị trạng thái loading
    btn.textContent = '⏳ Đang đăng nhập...';
    btn.disabled = true;
    
    console.log('Đang thử đăng nhập:', email);
    
    auth.signInWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            // Đăng nhập thành công
            console.log('Đăng nhập thành công!', userCredential.user.email);
            err.classList.remove('show');
            // Auth state listener sẽ tự động chuyển màn hình
        })
        .catch(e => {
            console.error('Lỗi đăng nhập:', e.code, e.message);
            let msg = '❌ ';
            
            // Xử lý các mã lỗi cụ thể
            switch(e.code) {
                case 'auth/invalid-email':
                    msg += 'Địa chỉ email không hợp lệ';
                    break;
                case 'auth/user-disabled':
                    msg += 'Tài khoản này đã bị vô hiệu hóa';
                    break;
                case 'auth/user-not-found':
                    msg += 'Không tìm thấy tài khoản với email này';
                    break;
                case 'auth/wrong-password':
                    msg += 'Mật khẩu không chính xác';
                    break;
                case 'auth/invalid-credential':
                    msg += 'Email hoặc mật khẩu không đúng';
                    break;
                case 'auth/too-many-requests':
                    msg += 'Quá nhiều lần thử. Vui lòng đợi vài phút';
                    break;
                case 'auth/network-request-failed':
                    msg += 'Lỗi kết nối mạng. Vui lòng kiểm tra internet';
                    break;
                case 'auth/configuration-not-found':
                    msg += 'Dự án Firebase chưa được cấu hình đúng';
                    break;
                default:
                    msg += 'Lỗi: ' + e.message;
            }
            
            err.textContent = msg;
            err.classList.add('show');
        })
        .finally(() => {
            // Khôi phục nút đăng nhập
            btn.textContent = '🔑 Đăng Nhập';
            btn.disabled = false;
        });
}

// ============ ĐĂNG KÝ ============
function register() {
    const name = document.getElementById('regName').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const pass = document.getElementById('regPass').value;
    const confirm = document.getElementById('regConfirm').value;
    const err = document.getElementById('regError');
    const btn = document.querySelector('#registerForm .btn-gold');
    
    // Reset thông báo lỗi
    err.classList.remove('show');
    
    // Kiểm tra dữ liệu đầu vào
    if (!email || !pass) {
        err.textContent = '❌ Vui lòng nhập đầy đủ email và mật khẩu';
        err.classList.add('show');
        return;
    }
    if (pass.length < 6) {
        err.textContent = '❌ Mật khẩu phải có ít nhất 6 ký tự';
        err.classList.add('show');
        return;
    }
    if (pass !== confirm) {
        err.textContent = '❌ Mật khẩu xác nhận không khớp';
        err.classList.add('show');
        return;
    }
    
    // Hiển thị trạng thái loading
    btn.textContent = '⏳ Đang đăng ký...';
    btn.disabled = true;
    
    console.log('Đang thử đăng ký:', email);
    
    auth.createUserWithEmailAndPassword(email, pass)
        .then((userCredential) => {
            // Đăng ký thành công
            console.log('Đăng ký thành công!', userCredential.user.email);
            
            // Lưu profile nếu có tên
            if (name && userCredential.user) {
                db.ref('users/' + userCredential.user.uid + '/profile').set({
                    name: name,
                    email: email,
                    createdAt: firebase.database.ServerValue.TIMESTAMP
                });
            }
            
            // Chuyển sang tab đăng nhập
            switchTab('login');
            document.getElementById('loginEmail').value = email;
            notify('✅ Đăng ký thành công! Hãy đăng nhập');
        })
        .catch(e => {
            console.error('Lỗi đăng ký:', e.code, e.message);
            let msg = '❌ ';
            
            // Xử lý các mã lỗi cụ thể
            switch(e.code) {
                case 'auth/email-already-in-use':
                    msg += 'Email này đã được sử dụng';
                    break;
                case 'auth/invalid-email':
                    msg += 'Địa chỉ email không hợp lệ';
                    break;
                case 'auth/operation-not-allowed':
                    msg += 'Tính năng đăng ký đang bị vô hiệu hóa';
                    break;
                case 'auth/weak-password':
                    msg += 'Mật khẩu quá yếu, hãy chọn mật khẩu khác';
                    break;
                case 'auth/network-request-failed':
                    msg += 'Lỗi kết nối mạng. Vui lòng kiểm tra internet';
                    break;
                case 'auth/configuration-not-found':
                    msg += 'Dự án Firebase chưa được cấu hình đúng';
                    break;
                default:
                    msg += 'Lỗi: ' + e.message;
            }
            
            err.textContent = msg;
            err.classList.add('show');
        })
        .finally(() => {
            // Khôi phục nút đăng ký
            btn.textContent = '📝 Đăng Ký';
            btn.disabled = false;
        });
}

// ============ ĐĂNG XUẤT ============
function logout() {
    if (confirm('🚪 Bạn có chắc muốn đăng xuất?')) {
        auth.signOut().then(() => {
            console.log('Đã đăng xuất');
            // Auth state listener sẽ tự động chuyển màn hình
        }).catch(e => {
            console.error('Lỗi đăng xuất:', e);
            notify('❌ Lỗi đăng xuất');
        });
    }
}

// ============ LƯU DỮ LIỆU ============
function save() {
    if (userExamsRef) {
        userExamsRef.set(exams).catch(e => {
            console.error('Lỗi lưu dữ liệu:', e);
            notify('❌ Lỗi lưu dữ liệu');
        });
    }
}
        // ============ ĐẾM LƯỢT TRUY CẬP ============
        function countVisit() {
            const visitRef = db.ref('stats/visits');
            visitRef.transaction(current => (current || 0) + 1);
            db.ref('stats/visitLog').push({
                time: Date.now(),
                userAgent: navigator.userAgent.substring(0, 100),
                screen: `${window.screen.width}x${window.screen.height}`
            });
        }

        function countUniqueVisitor() {
            const deviceId = localStorage.getItem('lightquiz_device_id');
            if (!deviceId) {
                const newId = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5);
                localStorage.setItem('lightquiz_device_id', newId);
                db.ref('stats/uniqueVisitors').push({
                    deviceId: newId,
                    firstVisit: Date.now()
                });
            }
        }

        countVisit();
        countUniqueVisitor();

        function notify(msg) {
            const t = document.createElement('div');
            t.className = 'toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 2300);
        }

        function showLoading(msg) { $('loadingText').textContent = msg;
            $('loading').classList.add('show'); }

        function hideLoading() { $('loading').classList.remove('show'); }

        // ============ MODAL HELPER ============
        function showModal(title, icon, content, buttons, dangerClass = '') {
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `
            <div class="modal-dialog ${dangerClass}">
                <h3><span class="modal-icon">${icon}</span> ${title}</h3>
                ${content}
                <div class="modal-buttons">${buttons}</div>
            </div>
        `;
            document.body.appendChild(overlay);

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) overlay.remove();
            });

            const escHandler = function(e) {
                if (e.key === 'Escape') {
                    overlay.remove();
                    document.removeEventListener('keydown', escHandler);
                }
            };
            document.addEventListener('keydown', escHandler);

            return overlay;
        }

        // ============ MODAL: TẠO ĐỀ ============
        function showCreateExamModal() {
            if (!questions.length) return notify('❌ Chưa có câu hỏi');

            const defaultName = 'Đề ' + new Date().toLocaleDateString('vi-VN');
            const content = `
            <input type="text" id="examNameInput" value="${defaultName}" placeholder="Nhập tên đề..." autofocus>
        `;
            const buttons = `
            <button class="btn-cancel" id="cancelCreateBtn">Hủy</button>
            <button class="btn-gold-modal" id="confirmCreateBtn">✨ Tạo</button>
        `;

            const overlay = showModal('📌 Tạo đề mới', '💡', content, buttons);

            const input = overlay.querySelector('#examNameInput');
            input.focus();
            input.select();

            overlay.querySelector('#cancelCreateBtn').onclick = () => overlay.remove();
            overlay.querySelector('#confirmCreateBtn').onclick = () => {
                const name = input.value.trim();
                if (!name) {
                    input.style.borderColor = 'var(--red)';
                    input.style.animation = 'wrongShake 0.5s ease-out';
                    setTimeout(() => {
                        input.style.borderColor = 'rgba(255,255,255,0.15)';
                        input.style.animation = '';
                    }, 500);
                    return;
                }
                createExamWithName(name);
                overlay.remove();
            };

            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') overlay.querySelector('#confirmCreateBtn').click();
            });
        }

        function createExamWithName(name) {
            const examData = {
                id: Date.now(),
                name,
                code: Math.random().toString(36).substring(2, 8).toUpperCase(),
                questions: JSON.parse(JSON.stringify(questions)),
                createdAt: Date.now(),
                attempts: 0,
                lastAttempt: null
            };
            exams.unshift(examData);
            save();
            if (userExamsRef) userExamsRef.push(examData);
            renderTeacher();
            notify('✅ Đã tạo: ' + name);
        }

        // ============ MODAL: RESET ============
        function showResetModal() {
            const unansweredCount = questions.filter(q => !q.correct).length;
            const totalCount = questions.length;
            const content = `
            <div class="warning-text">
                Bạn sắp <strong style="color:#ff6b6b">xóa tất cả đáp án</strong> đã chọn!<br><br>
                📊 Hiện có <strong style="color:#fdcb6e">${totalCount - unansweredCount}/${totalCount}</strong> câu đã có đáp án.<br>
                ⚠️ <strong style="color:#ff6b6b">${unansweredCount}</strong> câu chưa có đáp án.
            </div>
        `;
            const buttons = `
            <button class="btn-cancel" id="cancelResetBtn">Hủy</button>
            <button class="btn-gold-modal" id="confirmResetBtn">🗑 Xác nhận xóa</button>
        `;

            const overlay = showModal('🔄 Reset đáp án', '⚠️', content, buttons, 'danger');

            overlay.querySelector('#cancelResetBtn').onclick = () => overlay.remove();
            overlay.querySelector('#confirmResetBtn').onclick = () => {
                questions.forEach(q => q.correct = null);
                overlay.remove();
                renderTeacher();
                notify('🔄 Đã reset tất cả đáp án');
            };
        }

        // ============ MODAL: XÓA CÂU HỎI ============
        function showDeleteQuestionModal(idx) {
            const q = questions[idx];
            const content = `
            <div class="warning-text">
                Bạn có chắc muốn <strong style="color:#ff6b6b">xóa vĩnh viễn</strong> câu hỏi này?<br><br>
                📝 <strong>Câu ${idx + 1}:</strong> ${q.text.substring(0, 100)}${q.text.length > 100 ? '...' : ''}<br>
                ${q.correct ? '✅ Đáp án: <strong style="color:#55efc4">' + q.correct + '</strong>' : '⚠️ Chưa có đáp án'}
            </div>
        `;
            const buttons = `
            <button class="btn-cancel" id="cancelDeleteBtn">Hủy</button>
            <button class="btn-gold-modal" id="confirmDeleteBtn">🗑 Xác nhận xóa</button>
        `;

            const overlay = showModal('🗑 Xóa câu hỏi', '⚠️', content, buttons, 'danger');

            overlay.querySelector('#cancelDeleteBtn').onclick = () => overlay.remove();
            overlay.querySelector('#confirmDeleteBtn').onclick = () => {
                questions.splice(idx, 1);
                questions.forEach((q, i) => q.id = i + 1);
                overlay.remove();
                renderTeacher();
                notify('🗑 Đã xóa câu ' + (idx + 1));
            };
        }

        // ============ PARSE ============
        function parseQuestions(text) {
            text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n');
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            const blocks = [];
            let current = null;

            for (const line of lines) {
                let m = line.match(/^(?:Câu|câu)\s*(\d+)[:.]?\s*(.*)/i);
                if (!m) {
                    m = line.match(/^(\d+)[:.]\s+(.+)/);
                    if (m && parseInt(m[1]) >= 1 && parseInt(m[1]) <= 200) m = [m[0], m[1], m[2]];
                    else m = null;
                }
                if (m) {
                    if (current) blocks.push(current);
                    current = { num: parseInt(m[1]), content: [m[2] || ''] };
                } else if (current) {
                    current.content.push(line);
                }
            }
            if (current) blocks.push(current);

            const result = [];
            for (const block of blocks) {
                const full = block.content.join(' ');
                let options = [];
                const optRegex = /([A-D])\.\s+(.*?)(?=\s+[A-D]\.\s|$)/g;
                let m;
                while ((m = optRegex.exec(full)) !== null) {
                    const label = m[1];
                    if (!options.find(o => o.label === label)) options.push({ label, content: m[2].trim() });
                }
                if (options.length < 2) {
                    options = [];
                    for (const line of block.content) {
                        const om = line.match(/^([A-D])\.\s+(.+)/);
                        if (om) options.push({ label: om[1], content: om[2].trim() });
                    }
                }
                if (options.length < 2) {
                    const parts = full.split(/\s+[A-D]\.\s+/);
                    if (parts.length >= 5) {
                        options = [
                            { label: 'A', content: parts[1].trim() },
                            { label: 'B', content: parts[2].trim() },
                            { label: 'C', content: parts[3].trim() },
                            { label: 'D', content: parts[4].trim() }
                        ];
                    }
                }

                if (options.length >= 2) {
                    let qText = full;
                    const idx = full.search(/[A-D]\./);
                    if (idx > 0) qText = full.substring(0, idx).trim();
                    const seen = new Set();
                    let filtered = [];
                    for (const o of options) { if (!seen.has(o.label)) { seen.add(o.label);
                            filtered.push(o); } }
                    while (filtered.length < 4) { const labels = ['A', 'B', 'C', 'D']; const missing = labels.find(l => !seen
                            .has(l)); if (missing) { filtered.push({ label: missing, content: '' });
                            seen.add(missing); } else break; }
                    filtered.sort((a, b) => a.label.localeCompare(b.label));
                    result.push({ id: block.num, text: qText || `Câu ${block.num}`, options: filtered.slice(0, 4),
                        correct: null });
                }
            }
            result.sort((a, b) => a.id - b.id);
            result.forEach((q, i) => q.id = i + 1);
            return result;
        }

        // ============ LOAD FILE ============
        async function loadFile(file) {
            showLoading('Đang đọc file...');
            try {
                const buf = await file.arrayBuffer();
                const result = await mammoth.extractRawText({ arrayBuffer: buf });
                const text = result.value;
                if (!text || text.length < 10) throw new Error('File rỗng');
                const parsed = parseQuestions(text);
                if (!parsed.length) throw new Error('Không tìm thấy câu hỏi');
                questions = parsed;
                hideLoading();
                $('uploadScreen').style.display = 'none';
                renderTeacher();
                notify(`✅ Đã tải ${parsed.length} câu hỏi`);
            } catch (e) {
                hideLoading();
                notify('❌ ' + e.message);
            }
        }

        // ============ SCROLL TO TOP ============
        function setupScrollToTop() {
            const panel = $('panel');
            const btn = $('backToTop');

            panel.addEventListener('scroll', function() {
                if (panel.scrollTop > 200) {
                    btn.classList.add('show');
                } else {
                    btn.classList.remove('show');
                }
            });

            btn.onclick = function() {
                panel.scrollTo({ top: 0, behavior: 'smooth' });
            };
        }

        // ============ UPDATE STATS ============
        function updateStats() {
            const a = questions.filter(q => q.correct).length;
            $('stats').textContent = `${a}/${questions.length}`;
        }

        // ============ SET CORRECT ============
        function setCorrect(idx, letter) {
            if (currentMode !== 'teacher') return;
            questions[idx].correct = letter;
            const card = $('q_' + idx);
            if (card) {
                card.querySelectorAll('.opt').forEach(o => {
                    o.classList.remove('correct-answer');
                    if (o.getAttribute('data-letter') === letter) o.classList.add('correct-answer');
                });
                const badge = card.querySelector('.answer-badge');
                badge.textContent = '✅ ' + letter;
                badge.className = 'answer-badge set';
            }
            updateStats();
        }

        // ============ RENDER TEACHER ============
        function renderTeacher() {
            currentMode = 'teacher';
            currentExam = null;
            userAnswers = {};
            submitted = false;
            results = [];
            $('actions').style.display = 'flex';
            updateStats();

            let sideHtml = '<h3 style="margin-bottom:12px;color:var(--text)">📋 Đề thi</h3>';
            if (exams.length) {
                exams.forEach(ex => {
                    sideHtml +=
                        `<div style="background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:12px;padding:10px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
                <div><b>${ex.name}</b><br><small style="color:var(--text2)">${ex.code} - ${ex.questions.length} câu</small></div>
                <div style="display:flex;gap:4px">
                    <button class="btn btn-outline btn-sm" onclick="exportExam(${ex.id})">📥</button>
                    <button class="btn btn-primary btn-sm" onclick="doExam(${ex.id})">🎯</button>
                </div>
            </div>`;
                });
                sideHtml +=
                    '<button class="btn btn-outline btn-sm" style="width:100%;margin-top:8px;color:var(--red)" onclick="deleteExams()">🗑 Xóa đề</button>';
            } else {
                sideHtml +=
                    '<div style="color:var(--text2);text-align:center;padding:20px">Chưa có đề</div>';
            }
            $('sidebarContent').innerHTML = sideHtml;

            if (!questions.length) {
                $('panel').innerHTML =
                    '<div style="text-align:center;padding:60px;color:var(--text2)"><div style="font-size:3rem;margin-bottom:12px">💡</div>Chưa có câu hỏi</div>';
                return;
            }
            let html = '';
            questions.forEach((q, idx) => {
                const opts = q.options.map(opt =>
                    `<div class="opt ${q.correct === opt.label ? 'correct-answer' : ''}" data-letter="${opt.label}" onclick="setCorrect(${idx},'${opt.label}')">
                <span class="opt-letter">${opt.label}</span>
                <span>${opt.content || '(Trống)'}</span>
            </div>`
                ).join('');
                html += `<div class="q-card" id="q_${idx}">
            <div class="q-text">Câu ${q.id}: ${q.text}</div>
            <div class="options">${opts}</div>
            <div class="answer-badge ${q.correct ? 'set' : 'unset'}">${q.correct ? '✅ ' + q.correct : '⚡ Chưa chọn'}</div>
            <div style="margin-top:8px;display:flex;gap:6px">
                <button class="btn btn-outline btn-sm" onclick="editQ(${idx})">✏️ Sửa</button>
                <button class="btn btn-outline btn-sm" style="color:var(--red)" onclick="showDeleteQuestionModal(${idx})">🗑</button>
            </div>
        </div>`;
            });
            $('panel').innerHTML = html;
            setupScrollToTop();
        }

        // ============ EDIT ============
        function editQ(idx) {
            const q = questions[idx];
            const overlay = document.createElement('div');
            overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal-dialog" style="text-align:left;max-width:550px">
        <h3 style="text-align:center"><span class="modal-icon">✏️</span> Sửa câu ${idx + 1}</h3>
        <label style="display:block;font-weight:600;margin:6px 0 2px;font-size:.8rem;color:var(--text2)">Nội dung:</label>
        <textarea id="et" rows="3" style="width:100%;padding:10px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:var(--text);font-family:inherit;font-size:.9rem;resize:vertical;text-align:left">${q.text}</textarea>
        ${q.options.map((o,i) => `<label style="display:block;font-weight:600;margin:6px 0 2px;font-size:.8rem;color:var(--text2)">Đáp án ${['A','B','C','D'][i]}:</label><input id="e${i}" value="${o.content || ''}" style="width:100%;padding:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:var(--text);font-family:inherit;font-size:.9rem;text-align:left">`).join('')}
        <label style="display:block;font-weight:600;margin:6px 0 2px;font-size:.8rem;color:var(--text2)">Đáp án đúng:</label>
        <select id="ec" style="width:100%;padding:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:var(--text);font-family:inherit;font-size:.9rem"><option value="">-- Chọn --</option>${['A','B','C','D'].map(l => `<option value="${l}" ${q.correct===l?'selected':''}>${l}</option>`).join('')}</select>
        <div style="display:flex;gap:8px;justify-content:center;margin-top:20px">
            <button class="btn-cancel" id="cancelEditBtn">Hủy</button>
            <button class="btn-gold-modal" id="saveEditBtn">💾 Lưu</button>
        </div>
    </div>`;
            document.body.appendChild(overlay);

            overlay.addEventListener('click', function(e) {
                if (e.target === overlay) overlay.remove();
            });

            overlay.querySelector('#cancelEditBtn').onclick = () => overlay.remove();
            overlay.querySelector('#saveEditBtn').onclick = () => {
                q.text = overlay.querySelector('#et').value.trim() || q.text;

                q.correct = overlay.querySelector('#ec').value || null;

                notify('✅ Đã lưu');
            };
        }

        function deleteExams() {

            overlay.className = 'modal-overlay';
            overlay.innerHTML = `<div class="modal-dialog" style="max-width:500px">

            ${exams.map(e => `<label style="display:flex;align-items:center;gap:8px;margin:4px 0;cursor:pointer;padding:8px;border-radius:8px;transition:all 0.2s" onmouseover="this.style.background='rgba(255,255,255,0.03)'" onmouseout="this.style.background='transparent'"><input type="checkbox" value="${e.id}"> ${e.name} (${e.code})</label>`).join('')}

            document.body.appendChild(overlay);

            overlay.querySelector('#cancelDelExamBtn').onclick = () => overlay.remove();

                save();
                overlay.remove();
                renderTeacher();
                notify('Đã xóa ' + ids.length + ' đề');

        }

        function addQuestion() {
            questions.push({
                id: questions.length + 1,
                text: 'Nhập nội dung câu hỏi',
                options: [{ label: 'A', content: '' }, { label: 'B', content: '' }, { label: 'C', content: '' },

        }

        // ============ EXPORT ============
        function exportExam(id) {
            const ex = exams.find(e => e.id === id);
            if (!ex) return;
            const html = `<!DOCTYPE html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>LightQuiz - ${ex.name}</title><style>

</style></head><body><div class="cont"><div class="head"><h1>💡 <span>LightQuiz</span></h1><div style="color:#94a3b8;font-size:.85rem">Mã đề: ${ex.code}</div><div style="color:#94a3b8;font-size:.8rem;margin-top:4px">Soi sáng kiến thức - Bứt phá điểm số</div></div><div class="mw" style="display:flex;gap:16px;flex-wrap:wrap"><div class="qa" id="qa" style="flex:1"></div></div><div class="nw"><button class="nt" id="ntb" title="Thu/Phóng (Tab)">◀</button><div class="nav" id="nb"></div></div><button class="btop" id="btop" title="Lên đầu">↑</button></div><script>
const ed=${JSON.stringify({name:ex.name,code:ex.code,questions:ex.questions})};let ua={},sub=false,res=[],cf="all",nc=false;
document.getElementById('ntb').onclick=function(){nc=!nc;var n=document.getElementById('nb');var b=document.getElementById('ntb');if(nc){n.classList.add('collapsed');b.textContent='▶'}else{n.classList.remove('collapsed');b.textContent='◀'}};
var qa=document.getElementById('qa');var btop=document.getElementById('btop');
qa.addEventListener('scroll',function(){if(qa.scrollTop>200)btop.classList.add('show');else btop.classList.remove('show')});

        // ============ DO EXAM ============
        function doExam(id) {
            const ex = exams.find(e => e.id === id);
            if (!ex) return;
            currentMode = 'doing';
            currentExam = ex;
            userAnswers = {};
            submitted = false;
            results = [];
            currentFilter = 'all';

            $('actions').style.display = 'none';

            $('sidebarContent').innerHTML = `
        <h3 style="margin-bottom:12px;color:var(--text)">📑 Điều hướng</h3>
        <div class="nav-circles" id="navCircles" style="display:flex;flex-wrap:wrap;gap:6px;justify-content:center">
            ${ex.questions.map((_,i) => `<div class="nav-circle" id="nav_${i}" onclick="scrollToQ(${i})">${i+1}</div>`).join('')}
        </div>
        <div class="filter-buttons" id="filterBtns" style="display:flex;gap:4px;justify-content:center;margin-top:12px;flex-wrap:wrap"></div>
        <button class="submit-btn" id="submitSidebarBtn" onclick="submitExam()" style="margin-top:16px">✅ Nộp bài</button>
        <div id="submitArea" style="margin-top:12px"></div>`;

            renderExamUI();
        }

        function scrollToQ(i) {
            const card = $('q_' + i);
            if (card) card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        function renderExamUI() {
            if (!currentExam) return;
            const ex = currentExam;

            let html = ex.questions.map((q, i) => `
        <div class="q-card" id="q_${i}">
            <div class="q-text">Câu ${i+1}: ${q.text}</div>
            <div class="options">
                ${q.options.map(o => `
                    <div class="opt ${userAnswers[i] === o.label ? 'selected-answer' : ''}" 
                         id="opt_${i}_${o.label}"
                         data-i="${i}" data-l="${o.label}"
                         onclick="selectOption(${i},'${o.label}')">
                        <span class="opt-letter">${o.label}</span>
                        <span>${o.content || '(Trống)'}</span>
                    </div>
                `).join('')}
            </div>
        </div>
    `).join('');

            html += `<div id="resultArea"></div>`;
            html += `<div style="text-align:center;margin-top:12px">
        <button class="btn btn-outline btn-sm" onclick="backToTeacher()">← Quay về</button>
    </div>`;

            $('panel').innerHTML = html;
            setupScrollToTop();

            const sb = $('submitSidebarBtn');
            if (sb) { sb.style.display = 'block';
                sb.textContent = '✅ Nộp bài';
                sb.onclick = submitExam; }
            $('submitArea').innerHTML = '';
            $('filterBtns').innerHTML = '';
        }

        function selectOption(i, label) {
            if (submitted || currentMode !== 'doing') return;
            userAnswers[i] = label;

            const card = $('q_' + i);
            if (card) {
                card.querySelectorAll('.opt').forEach(o => {
                    o.classList.remove('selected-answer');
                    if (o.getAttribute('data-l') === label) o.classList.add('selected-answer');
                });
            }
            const nav = $('nav_' + i);
            if (nav) nav.classList.add('answered');
        }

        function submitExam() {
            if (submitted || !currentExam) return;
            submitted = true;
            const ex = currentExam;

            let correct = 0;
            results = [];

            ex.questions.forEach((q, i) => {
                const isCorrect = (q.correct && userAnswers[i] === q.correct);
                if (isCorrect) correct++;
                results.push({ isCorrect, correct: q.correct });

                const card = $('q_' + i);
                if (card) {
                    card.classList.add(isCorrect ? 'correct-card' : 'wrong-card');
                    if (q.correct) {
                        const correctOpt = $('opt_' + i + '_' + q.correct);
                        if (correctOpt) correctOpt.classList.add('correct-answer');
                    }
                }
            });

            const score = (correct / ex.questions.length * 10).toFixed(2);
            const wrong = ex.questions.length - correct;

            ex.questions.forEach((_, i) => {
                const nav = $('nav_' + i);
                if (nav) nav.className = 'nav-circle ' + (results[i].isCorrect ? 'result-correct' :
                    'result-wrong');
            });

            const fb = $('filterBtns');
            if (fb) {
                fb.innerHTML = `
            <button class="filter-btn active" onclick="filterCards('all')">📋 Tất cả</button>
            <button class="filter-btn" onclick="filterCards('correct')">✅ Đúng (${correct})</button>
            <button class="filter-btn" onclick="filterCards('wrong')">❌ Sai (${wrong})</button>
        `;
            }

            const resultHTML = `
        <div id="resultCard" class="result-card" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:20px;text-align:center;margin-bottom:20px">
            <div style="font-size:2rem;font-weight:800;background:linear-gradient(135deg,#fdcb6e,#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🏆 ${score}/10</div>
            <div style="margin:8px 0">✅ Đúng ${correct}/${ex.questions.length}</div>
            <button class="btn btn-outline btn-sm" onclick="retryExam()" style="margin-top:8px;border-color:rgba(253,203,110,0.3);color:#fdcb6e">🔄 Làm lại</button>
        </div>
    `;

            const oldResult = $('resultCard');
            if (oldResult) oldResult.remove();
            const oldResultArea = $('resultArea');
            if (oldResultArea) oldResultArea.remove();

            const panel = $('panel');
            panel.insertAdjacentHTML('afterbegin', resultHTML);
            panel.scrollTo({ top: 0, behavior: 'smooth' });

            $('submitArea').innerHTML = `
        <div style="background:rgba(255,255,255,0.05);border-radius:12px;padding:12px;text-align:center;margin-top:12px">
            <div style="font-weight:700;background:linear-gradient(135deg,#fdcb6e,#f39c12);-webkit-background-clip:text;-webkit-text-fill-color:transparent">🏆 ${score}/10</div>
            <div style="font-size:0.75rem;color:var(--text2)">${correct}/${ex.questions.length} đúng</div>
        </div>
    `;
            const sb = $('submitSidebarBtn');
            if (sb) sb.style.display = 'none';

            ex.questions.forEach((_, i) => {
                const nav = $('nav_' + i);
                if (nav) nav.onclick = () => scrollToQ(i);
            });
        }

        function filterCards(type) {
            currentFilter = type;
            document.querySelectorAll('#filterBtns .filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            document.querySelectorAll('#panel .q-card').forEach((card, i) => {
                if (type === 'all') card.classList.remove('hidden');
                else if (type === 'correct') results[i]?.isCorrect ? card.classList.remove('hidden') : card
                    .classList.add('hidden');
                else results[i] && !results[i].isCorrect ? card.classList.remove('hidden') : card.classList.add(
                    'hidden');
            });
        }

        function retryExam() {
            userAnswers = {};
            submitted = false;
            results = [];
            renderExamUI();
            if (currentExam) {
                currentExam.questions.forEach((_, i) => {
                    const nav = $('nav_' + i);
                    if (nav) { nav.className = 'nav-circle';
                        nav.onclick = () => scrollToQ(i); }
                });
            }
            $('filterBtns').innerHTML = '';
            $('submitArea').innerHTML = '';
            const sb = $('submitSidebarBtn');
            if (sb) { sb.style.display = 'block';
                sb.textContent = '✅ Nộp bài';
                sb.onclick = submitExam; }
            const resultCard = $('resultCard');
            if (resultCard) resultCard.remove();
        }

        function backToTeacher() {
            currentMode = 'teacher';
            currentExam = null;
            userAnswers = {};
            submitted = false;
            results = [];
            renderTeacher();
        }

        // ============ KEYBOARD SHORTCUT ============
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                $('sidebar').classList.toggle('open');
            }
            if (e.key === 'Escape') {
                $('sidebar').classList.remove('open');
                document.querySelectorAll('.modal-overlay').forEach(m => m.remove());
            }
        });

        // ============ INIT ============
        $('fileInput').addEventListener('change', async e => {
            if (e.target.files[0]) {
                $('fileName').textContent = e.target.files[0].name;
                await loadFile(e.target.files[0]);
            }
        });

        $('fileInput2').addEventListener('change', async e => {
            if (e.target.files[0]) await loadFile(e.target.files[0]);
        });

        // Drag & drop
        const uploadBox = $('uploadBox');
        uploadBox.addEventListener('dragover', e => { e.preventDefault();
            uploadBox.classList.add('drag-over'); });
        uploadBox.addEventListener('dragleave', () => uploadBox.classList.remove('drag-over'));
        uploadBox.addEventListener('drop', async e => {
            e.preventDefault();
            uploadBox.classList.remove('drag-over');
            const file = e.dataTransfer.files[0];
            if (file && file.name.endsWith('.docx')) {
                $('fileName').textContent = file.name;
                await loadFile(file);
            }
        });
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', e => e.preventDefault());

        // Close sidebar on outside click
        document.addEventListener('click', e => {
            const sidebar = $('sidebar');
            if (sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== $('menuBtn') && !$(
                    'menuBtn').contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });

        $('menuBtn').addEventListener('click', () => $('sidebar').classList.toggle('open'));
    </script>
